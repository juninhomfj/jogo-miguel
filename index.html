<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #e0f7fa; }</style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            backgroundColor: '#87CEEB', // Fundo azul céu
            physics: { default: 'arcade', arcade: { gravity: { y: 400 }, debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);

        function preload() {
            // Aqui estão as dimensões exatas que calculamos!
            this.load.spritesheet('miguel', 'miguel_sprites.png', { frameWidth: 543, frameHeight: 724 });
        }

        function create() {
            // Cria o personagem no centro da tela
            this.player = this.physics.add.sprite(400, 300, 'miguel');
            
            // REDUZ O TAMANHO DO PERSONAGEM PARA CABER NA TELA (20% do tamanho original)
            this.player.setScale(0.2); 
            
            // Ajusta a "caixa de colisão" para acompanhar o novo tamanho
            this.player.updateBounds(); 
            this.player.setCollideWorldBounds(true);

            // Animação de Caminhada (frames 1 e 2)
            this.anims.create({
                key: 'walk',
                frames: this.anims.generateFrameNumbers('miguel', { start: 1, end: 2 }),
                frameRate: 10,
                repeat: -1
            });

            // Animação Parado (frame 0)
            this.anims.create({
                key: 'idle',
                frames: [ { key: 'miguel', frame: 0 } ],
                frameRate: 20
            });

            // Animação Pulando (frame 3)
            this.anims.create({
                key: 'jump',
                frames: [ { key: 'miguel', frame: 3 } ],
                frameRate: 20
            });

            this.cursors = this.input.keyboard.createCursorKeys();
        }

        function update() {
            let noChao = this.player.body.onFloor();

            // Movimento para esquerda
            if (this.cursors.left.isDown) {
                this.player.setVelocityX(-200);
                this.player.flipX = true; // Vira o personagem
                if (noChao) this.player.anims.play('walk', true);
            }
            // Movimento para direita
            else if (this.cursors.right.isDown) {
                this.player.setVelocityX(200);
                this.player.flipX = false;
                if (noChao) this.player.anims.play('walk', true);
            }
            // Parado
            else {
                this.player.setVelocityX(0);
                if (noChao) this.player.anims.play('idle', true);
            }

            // Pulo
            if (this.cursors.up.isDown && noChao) {
                this.player.setVelocityY(-350);
            }

            // Animação de pulo (se não estiver no chão)
            if (!noChao) {
                this.player.anims.play('jump', true);
            }
        }
    </script>
</body>
</html>
