<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>As Aventuras do Miguel</title>

    <script src="js/phase-config.js?v=physical-controls-crouch-20260715-223914"></script>
    <script src="js/device-manager.js?v=physical-controls-crouch-20260715-223914"></script>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="js/scene-visuals.js?v=physical-controls-crouch-20260715-223914"></script>
    <script src="js/mobile-controls.js?v=physical-controls-crouch-20260715-223914"></script>
    <script src="js/input-manager.js?v=physical-controls-crouch-20260715-223914"></script>
    <script src="js/hud-manager.js?v=physical-controls-crouch-20260715-223914"></script>
    <script src="js/health-manager.js?v=physical-controls-crouch-20260715-223914"></script>
    <script src="js/tutorial-manager.js?v=physical-controls-crouch-20260715-223914"></script>
    <script src="js/rotation-manager.js?v=physical-controls-crouch-20260715-223914"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        html,
        body,
        #game-container,
        canvas {
            touch-action: none;
            overscroll-behavior: none;
        }
        body {
            background-color: #0d1117;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Caixa de Input de Nome Estilo Arcade Retro (Mobile Friendly) */
        #name-input-container {
            position: absolute;
            display: none; /* Controlado dinamicamente pelo Phaser */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: rgba(20, 25, 35, 0.95);
            border: 4px solid #FFCC00;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.5);
            width: 85%;
            max-width: 340px;
        }
        #name-input-container label {
            font-size: 18px;
            color: #FFCC00;
            margin-bottom: 12px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #player-name-input {
            width: 100%;
            padding: 12px;
            font-size: 26px;
            text-align: center;
            text-transform: uppercase;
            border: 2px solid #FFCC00;
            background: #111;
            color: #FFF;
            font-family: inherit;
            font-weight: bold;
            letter-spacing: 4px;
            outline: none;
            border-radius: 6px;
        }
        #start-button {
            margin-top: 18px;
            width: 100%;
            padding: 14px;
            font-size: 20px;
            background: #FFCC00;
            color: #0d1117;
            border: none;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 0 #CC9900;
        }
        #start-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #CC9900;
        }

        #orientation-overlay {
            position: fixed;
            inset: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            padding:
                max(20px, env(safe-area-inset-top))
                max(20px, env(safe-area-inset-right))
                max(20px, env(safe-area-inset-bottom))
                max(20px, env(safe-area-inset-left));

            background:
                rgba(6, 10, 18, 0.97);

            z-index: 1000;

            opacity: 0;
            visibility: hidden;
            pointer-events: none;

            transition:
                opacity 160ms ease,
                visibility 160ms ease;
        }

        #orientation-overlay.is-visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .orientation-card {
            width: min(92vw, 460px);

            padding: 28px 22px;

            border: 4px solid #FFCC00;
            border-radius: 18px;

            background: #101621;

            text-align: center;

            box-shadow:
                0 0 32px
                rgba(255, 204, 0, 0.38);
        }

        .orientation-icon {
            display: block;

            margin-bottom: 12px;

            color: #FFCC00;

            font-size: 68px;
            line-height: 1;
        }

        .orientation-card h2 {
            margin: 0 0 12px;

            color: #FFCC00;

            font-size: clamp(24px, 7vw, 38px);
            letter-spacing: 2px;
        }

        .orientation-card p {
            margin: 0 auto 18px;

            max-width: 380px;

            color: #FFFFFF;

            font-size: clamp(15px, 4vw, 19px);
            line-height: 1.45;
        }

        .orientation-actions {
            display: grid;
            gap: 12px;
        }

        .orientation-actions button {
            width: 100%;

            padding: 14px 16px;

            border: 0;
            border-radius: 8px;

            font-family: inherit;
            font-size: 17px;
            font-weight: bold;

            cursor: pointer;
        }

        #orientation-action {
            color: #101621;
            background: #FFCC00;

            box-shadow: 0 4px 0 #B88A00;
        }

        #sensor-action {
            color: #FFFFFF;

            border: 2px solid #00E5FF;

            background: #183244;
        }

        #sensor-action:disabled {
            opacity: 0.65;
            cursor: default;
        }

        #orientation-status {
            display: block;

            margin-top: 16px;

            color: #8FE9FF;

            font-size: 12px;
            line-height: 1.4;
        }

        canvas {
            display: block;

            max-width: 100%;
            max-height: 100%;

            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        @media (
            orientation: landscape
        ) and (
            max-height: 520px
        ) {
            #name-input-container {
                width: min(82vw, 320px);
                padding: 14px;
            }

            #name-input-container label {
                margin-bottom: 7px;
                font-size: 15px;
            }

            #player-name-input {
                padding: 8px;
                font-size: 21px;
            }

            #start-button {
                margin-top: 10px;
                padding: 10px;
                font-size: 17px;
            }
        }


        /*
         * Centralização controlada somente pelo CSS.
         * Phaser calcula a escala, enquanto o Grid
         * posiciona o canvas no centro da área visível.
         */
        :root {
            --app-width: 100vw;
            --app-height: 100dvh;
        }

        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
        }

        body {
            position: fixed;
            inset: 0;

            width: 100%;
            height: 100%;

            display: block;

            overflow: hidden;
            background: #000000;
        }

        #game-container {
            position: fixed;
            inset: 0;

            width: var(--app-width);
            height: var(--app-height);

            min-width: 0;
            min-height: 0;

            display: grid;
            place-items: center;

            overflow: hidden;
            background: #000000;

            padding:
                env(safe-area-inset-top)
                env(safe-area-inset-right)
                env(safe-area-inset-bottom)
                env(safe-area-inset-left);
        }

        #game-container:fullscreen,
        #game-container:-webkit-full-screen {
            width: 100%;
            height: 100%;
        }

        #game-container > canvas {
            grid-area: 1 / 1;

            position: relative !important;

            left: auto !important;
            right: auto !important;
            top: auto !important;
            bottom: auto !important;

            margin: 0 !important;

            align-self: center;
            justify-self: center;
        }


        #game-container > canvas {
            opacity: 1;

            transition:
                opacity 140ms linear;
        }

        #game-container.layout-settling > canvas,
        #game-container.orientation-blocked > canvas {
            opacity: 0;
        }


        /*
         * A geometria do aviso é independente do canvas.
         * Quando o navegador continua bloqueado em
         * paisagem, somente esta camada é girada.
         */
        #orientation-overlay {
            padding: 0;
            overflow: hidden;

            transform: translateZ(0);
        }

        #orientation-rotator {
            position: absolute;
            left: 50%;
            top: 50%;

            width:
                var(
                    --orientation-stage-width,
                    100dvw
                );

            height:
                var(
                    --orientation-stage-height,
                    100dvh
                );

            display: grid;
            place-items: center;

            padding:
                max(
                    14px,
                    env(safe-area-inset-top)
                )
                max(
                    14px,
                    env(safe-area-inset-right)
                )
                max(
                    14px,
                    env(safe-area-inset-bottom)
                )
                max(
                    14px,
                    env(safe-area-inset-left)
                );

            transform:
                translate(-50%, -50%)
                rotate(
                    var(
                        --orientation-rotation,
                        0deg
                    )
                );

            transform-origin: center center;

            transition:
                transform 130ms ease;
        }

        #orientation-rotator .orientation-card {
            width:
                min(
                    calc(100% - 28px),
                    460px
                );

            max-height:
                calc(100% - 28px);

            overflow-x: hidden;
            overflow-y: auto;

            overscroll-behavior: contain;
            touch-action: pan-y;

            scrollbar-width: thin;
        }

        #orientation-overlay.is-rotated
        .orientation-card {
            width:
                min(
                    calc(100% - 24px),
                    430px
                );

            padding: 18px 16px;

            border-width: 3px;
        }

        #orientation-overlay.is-rotated
        .orientation-icon {
            margin-bottom: 7px;
            font-size: 48px;
        }

        #orientation-overlay.is-rotated
        .orientation-card h2 {
            margin-bottom: 8px;

            font-size:
                clamp(
                    22px,
                    7vw,
                    32px
                );

            line-height: 1.15;
        }

        #orientation-overlay.is-rotated
        .orientation-card p {
            margin-bottom: 12px;

            font-size:
                clamp(
                    14px,
                    4vw,
                    17px
                );

            line-height: 1.35;
        }

        #orientation-overlay.is-rotated
        .orientation-actions {
            gap: 8px;
        }

        #orientation-overlay.is-rotated
        .orientation-actions button {
            padding: 10px 12px;
            font-size: 14px;
        }

        #orientation-overlay.is-rotated
        #orientation-status {
            margin-top: 9px;

            font-size: 10px;

            overflow-wrap: anywhere;
        }

        #game-container.orientation-transitioning
        > canvas,

        #game-container.orientation-blocked
        > canvas {
            opacity: 0;

            pointer-events: none;
        }


        /*
         * O formulário do menu usa as áreas livres da
         * tela física. Em aparelhos compridos ele fica
         * lateralmente, preservando a arte do canvas.
         */
        @media (pointer: coarse) {
            #name-input-container {
                position: fixed;

                left: 50%;
                right: auto;
                top: auto;

                bottom:
                    max(
                        12px,
                        env(
                            safe-area-inset-bottom
                        )
                    );

                width:
                    min(
                        88vw,
                        320px
                    );

                max-width: none;

                padding: 13px;

                border-width: 3px;
                border-radius: 10px;

                transform:
                    translateX(-50%);

                z-index: 120;

                box-shadow:
                    0 0 18px
                    rgba(
                        255,
                        204,
                        0,
                        0.34
                    );
            }

            #name-input-container label {
                margin-bottom: 7px;
                font-size: 14px;
                letter-spacing: 1px;
            }

            #player-name-input {
                padding: 8px;
                font-size: 20px;
            }

            #start-button {
                margin-top: 9px;
                padding: 10px;
                font-size: 15px;
            }
        }

        @media (
            pointer: coarse
        ) and (
            orientation: landscape
        ) {
            #name-input-container {
                left: auto;

                right:
                    max(
                        12px,
                        env(
                            safe-area-inset-right
                        )
                    );

                top: 50%;
                bottom: auto;

                width:
                    clamp(
                        218px,
                        25vw,
                        300px
                    );

                max-height:
                    calc(
                        100dvh - 20px
                    );

                padding: 12px;

                transform:
                    translateY(-50%);
            }
        }

        @media (
            pointer: coarse
        ) and (
            orientation: landscape
        ) and (
            min-aspect-ratio: 19 / 9
        ) {
            #name-input-container {
                right:
                    max(
                        16px,
                        3vw,
                        env(
                            safe-area-inset-right
                        )
                    );

                width:
                    clamp(
                        210px,
                        21vw,
                        280px
                    );
            }
        }

    </style>
</head>
<body>

    <div id="game-container">
        <div
            id="orientation-overlay"
            aria-hidden="true"
        >
            <div id="orientation-rotator">
                <div class="orientation-card">
                <span
                    class="orientation-icon"
                    aria-hidden="true"
                >↻</span>

                <h2 id="orientation-title">
                    GIRE PARA HORIZONTAL
                </h2>

                <p id="orientation-message">
                    Esta fase foi criada para jogar
                    com o celular deitado.
                </p>

                <div class="orientation-actions">
                    <button
                        id="orientation-action"
                        type="button"
                    >
                        TELA CHEIA E GIRAR
                    </button>

                    <button
                        id="sensor-action"
                        type="button"
                    >
                        ATIVAR SENSOR
                    </button>
                </div>

                <small id="orientation-status">
                    Verificando o aparelho...
                </small>
                </div>
            </div>
        </div>

        <div id="name-input-container">
            <label for="player-name-input">Nome do Herói</label>
            <input type="text" id="player-name-input" maxlength="3" placeholder="MIG" autocomplete="off">
            <button id="start-button">INICIAR TUTORIAL</button>
        </div>
    </div>

    <script>
        const CONFIGURACAO_FASES = (
            window.MIGUEL_PHASE_CONFIG
        );

        const GERENCIADOR_DISPOSITIVO = (
            window.MIGUEL_DEVICE_MANAGER
        );

        GERENCIADOR_DISPOSITIVO.inicializar();

        window.__MIGUEL_BUILD_ID__ = 'physical-controls-crouch-20260715-223914';

        console.info(
            '[MIGUEL BUILD]',
            window.__MIGUEL_BUILD_ID__
        );

        window.__MIGUEL_PHASES__ = (
            CONFIGURACAO_FASES
        );

        // ==========================================
        // CENA 1: MENU PRINCIPAL
        // ==========================================
        class MenuPrincipal extends Phaser.Scene {
            constructor() {
                super('MenuPrincipal');
            }

            preload() {
                // Alerta automático caso a imagem dê erro ao carregar do GitHub
                this.load.on('loaderror', function (file) {
                    alert("AVISO DEV: Não foi possível carregar a imagem '" + file.src + "'. Verifique se o nome está idêntico com letras minúsculas!");
                });

                // MIGUEL — 14 frames individuais aprovados.
                // Cada textura possui canvas RGBA de 256x256.
                this.load.image(
                    'miguel_idle',
                    'assets/frames/miguel/00_idle.png'
                );
                this.load.image(
                    'miguel_walk_1',
                    'assets/frames/miguel/01_walk_1.png'
                );
                this.load.image(
                    'miguel_walk_2',
                    'assets/frames/miguel/02_walk_2.png'
                );
                this.load.image(
                    'miguel_walk_3',
                    'assets/frames/miguel/03_walk_3.png'
                );
                this.load.image(
                    'miguel_jump',
                    'assets/frames/miguel/04_jump.png'
                );
                this.load.image(
                    'miguel_double_jump',
                    'assets/frames/miguel/05_double_jump.png'
                );
                this.load.image(
                    'miguel_punch',
                    'assets/frames/miguel/06_punch.png'
                );
                this.load.image(
                    'miguel_power_cast',
                    'assets/frames/miguel/07_power_cast.png'
                );
                this.load.image(
                    'miguel_dust_1',
                    'assets/frames/miguel/08_dust_1.png'
                );
                this.load.image(
                    'miguel_dust_2',
                    'assets/frames/miguel/09_dust_2.png'
                );
                this.load.image(
                    'miguel_dust_3',
                    'assets/frames/miguel/10_dust_3.png'
                );
                this.load.image(
                    'miguel_reserved',
                    'assets/frames/miguel/11_reserved.png'
                );
                this.load.image(
                    'miguel_hurt',
                    'assets/frames/miguel/12_hurt.png'
                );
                this.load.image(
                    'miguel_victory',
                    'assets/frames/miguel/13_victory_trophy.png'
                );

                // Robô histórico provisório.
                // Será substituído quando os frames do robô
                // forem reconstruídos e aprovados.
                this.load.spritesheet(
                    'robo',
                    'assets/legacy/'
                    + 'sprites-invalidos-2026-07-13/'
                    + 'robo_sprites_original.png',
                    {
                        frameWidth: 215,
                        frameHeight: 129,
                        spacing: 0
                    }
                );

// Gera a textura do cristal tecnológico via código puro
                const graficoCristal = this.make.graphics({ x: 0, y: 0, add: false });
                graficoCristal.fillStyle(0x00E5FF, 0.35);
                graficoCristal.fillCircle(18, 18, 18);
                graficoCristal.fillStyle(0x00FFFF, 1);
                graficoCristal.fillPoints([
                    { x: 18, y: 0 },
                    { x: 34, y: 18 },
                    { x: 18, y: 36 },
                    { x: 2, y: 18 }
                ], true);
                graficoCristal.lineStyle(3, 0xE6FFFF, 1);
                graficoCristal.strokePoints([
                    { x: 18, y: 0 },
                    { x: 34, y: 18 },
                    { x: 18, y: 36 },
                    { x: 2, y: 18 }
                ], true);
                graficoCristal.lineStyle(2, 0x7DF9FF, 0.85);
                graficoCristal.lineBetween(18, 0, 18, 36);
                graficoCristal.lineBetween(2, 18, 34, 18);
                graficoCristal.fillStyle(0xFFFFFF, 0.9);
                graficoCristal.fillCircle(13, 10, 3);
                graficoCristal.generateTexture('cristalTecnologico', 36, 36);
                graficoCristal.destroy();
            }

            create() {
                GERENCIADOR_DISPOSITIVO
                    .desativarFase();

                this.visualMenu = (
                    new window.MiguelSceneVisuals(
                        this,
                        {
                            tipo: 'menu'
                        }
                    )
                );

                this.visualMenu.criarMenu();

                // Ativa e exibe a caixa de texto em HTML em cima do canvas
                const containerNome = document.getElementById('name-input-container');
                containerNome.style.display = 'flex';
                containerNome.style.visibility = 'visible';

                // Lógica ao clicar no botão "ENTRAR"
                const botaoEntrar = document.getElementById('start-button');
                botaoEntrar.onclick = async () => {
                    let nome = document.getElementById('player-name-input').value.trim();
                    if (!nome) nome = "MIG";
                    nome = nome.substring(0, 3).toUpperCase();

                    this.registry.set('nomeJogador', nome);
                    this.registry.set('pontuacao', 0);

                    // A ação do usuário permite solicitar
                    // tela cheia e orientação quando suportado.
                    await GERENCIADOR_DISPOSITIVO
                        .entrarModoJogo(
                            CONFIGURACAO_FASES
                                .fases
                                .Tutorial
                        );

                    // Inicia a fase e garante que a camada HTML não bloqueie o canvas.
                    this.scene.start('Tutorial');
                    containerNome.style.visibility = 'hidden';
                    containerNome.style.display = 'none';
                };
            }
        }

        // ==========================================
        // CENA 2: TUTORIAL
        // ==========================================
        class Tutorial extends Phaser.Scene {
            constructor() {
                super('Tutorial');
            }

            create() {
                console.log('Tutorial iniciado');

                GERENCIADOR_DISPOSITIVO
                    .ativarFase(
                        CONFIGURACAO_FASES
                            .fases
                            .Tutorial
                    );

                this.visualCenario = (
                    new window.MiguelSceneVisuals(
                        this,
                        {
                            tipo: 'tutorial'
                        }
                    )
                );

                this.visualCenario
                    .criarTutorial();

                // Estado exibido pelo HUD consolidado.
                this.nome = (
                    this.registry.get(
                        'nomeJogador'
                    )
                    || 'MIG'
                );

                this.pontos = Number(
                    this.registry.get(
                        'pontuacao'
                    )
                    || 0
                );

                this.textoPlacar = null;

                // PLATAFORMAS (Alto contraste)
                this.plataformas = this.physics.add.staticGroup();

                // Chão tecnológico.
                let chao = this.add.rectangle(
                    400,
                    460,
                    800,
                    40,
                    0x16464a
                );

                this.visualCenario
                    .decorarPlataforma(
                        chao,
                        {
                            tipo: 'chao'
                        }
                    );

                this.physics.add.existing(
                    chao,
                    true
                );

                this.plataformas.add(chao);

                // Plataformas flutuantes do treinamento.
                let plat1 = this.add.rectangle(
                    600,
                    300,
                    180,
                    24,
                    0x1b5061
                );

                this.visualCenario
                    .decorarPlataforma(
                        plat1,
                        {
                            tipo: 'flutuante'
                        }
                    );

                this.physics.add.existing(
                    plat1,
                    true
                );

                this.plataformas.add(plat1);

                let plat2 = this.add.rectangle(
                    200,
                    200,
                    180,
                    24,
                    0x1b5061
                );

                this.visualCenario
                    .decorarPlataforma(
                        plat2,
                        {
                            tipo: 'flutuante'
                        }
                    );

                this.physics.add.existing(
                    plat2,
                    true
                );

                this.plataformas.add(plat2);

                // INIMIGO: robô vilão animado pelo spritesheet novo
                if (!this.textures.exists('particulaVilao')) {
                    const graficoParticula = this.make.graphics({ x: 0, y: 0, add: false });
                    graficoParticula.fillStyle(0xFF2222, 1);
                    graficoParticula.fillRect(0, 0, 8, 8);
                    graficoParticula.generateTexture('particulaVilao', 8, 8);
                    graficoParticula.destroy();
                }

                this.vilao = this.physics.add.sprite(600, 366, 'robo', 0);
                this.vilao.setScale(0.45);
                this.vilao.setCollideWorldBounds(false);
                this.vilao.setVelocityX(90);
                this.vilao.setBounce(0);
                this.vilao.body.setSize(78, 92);
                this.vilao.body.setOffset(25, 24);
                this.vilao.limiteEsquerda = plat1.x - (plat1.width / 2) + (this.vilao.displayWidth / 2);
                this.vilao.limiteDireita = plat1.x + (plat1.width / 2) - (this.vilao.displayWidth / 2);
                this.vilao.direcao = 1;

                // Configuração reutilizável do inimigo.
                this.vilao.tipoInimigo = 'robo-tutorial';
                this.vilao.modoDerrota = 'attack';
                this.vilao.vida = 1;
                this.vilao.danoContato = 20;
                this.vilao.danoPisao = 20;

                this.ultimoDanoVilao = 0;

                // CRIANDO O MIGUEL
                this.player = this.physics.add.sprite(50, 320, 'miguel_idle');
                this.player.setScale(0.95);
                this.player.corpoPadrao = {
                    largura: 54,
                    altura: 116,
                    offsetX: 101,
                    offsetY: 108
                };

                this.player.corpoAgachado = {
                    largura: 54,
                    altura: 74,
                    offsetX: 101,
                    offsetY: 150
                };

                this.player.body.setSize(
                    this.player.corpoPadrao
                        .largura,

                    this.player.corpoPadrao
                        .altura
                );

                this.player.body.setOffset(
                    this.player.corpoPadrao
                        .offsetX,

                    this.player.corpoPadrao
                        .offsetY
                );

                this.player.pulosDisponiveis = 2;
                this.player.estaAtacando = false;
                this.player.estaEmPoeira = false;
                this.player.giroDuploAtivo = false;
                this.player.estaAgachado = false;
                this.player.estavaNoChao = false;
                this.player.estaMachucado = false;
                this.player.setDepth(10);
                this.player.setCollideWorldBounds(true);

                this.physics.add.collider(this.player, this.plataformas);
                this.physics.add.collider(this.vilao, this.plataformas);
                this.physics.add.collider(this.player, this.vilao, this.acertarVilao, null, this);

                // Os frames de poeira contêm o Miguel completo.
                // Por isso o efeito substitui visualmente o jogador
                // durante alguns milissegundos, em vez de criar um
                // segundo Miguel abaixo da linha do chão.
                this.poeira = this.add.sprite(
                    0,
                    0,
                    'miguel_dust_1'
                );

                this.poeira
                    .setVisible(false)
                    .setDepth(11)
                    .setScale(0.95);

                // Visual separado para a cambalhota.
                // O corpo físico permanece no player original.
                this.doubleJumpVisual = this.add.image(
                    0,
                    0,
                    'miguel_double_jump'
                );

                // Centro aproximado do corpo recolhido:
                // bbox do frame: 81,126 até 174,200.
                this.doubleJumpVisual.setOrigin(
                    127.5 / 256,
                    163 / 256
                );

                // A pose é comprimida verticalmente para parecer
                // mais agachada e recolhida durante o giro.
                this.doubleJumpVisual.setScale(
                    1.02,
                    0.82
                );

                this.doubleJumpVisual
                    .setVisible(false)
                    .setDepth(12);

                this.tweenGiroDuplo = null;

                // A mesma pose recolhida da cambalhota é
                // reutilizada, sem giro, como agachamento.
                this.crouchVisual = this.add.image(
                    0,
                    0,
                    'miguel_double_jump'
                );

                this.crouchVisual
                    .setOrigin(
                        127.5 / 256,
                        200 / 256
                    )
                    .setScale(
                        1.02,
                        0.72
                    )
                    .setVisible(false)
                    .setDepth(12);

                // CRISTAIS TECNOLÓGICOS COLETÁVEIS
                this.cristais = this.physics.add.group({
                    key: 'cristalTecnologico',
                    repeat: 4,
                    setXY: { x: 180, y: 25, stepX: 130 }
                });

                this.cristais.children.iterate(function (child) {
                    child.setBounceY(Phaser.Math.FloatBetween(0.4, 0.6));
                    child.setAngularVelocity(90);
                    child.setDepth(5);
                });

                this.physics.add.collider(this.cristais, this.plataformas);
                this.physics.add.overlap(this.player, this.cristais, this.coletarCristal, null, this);

                // ANIMAÇÕES DO MIGUEL
                // Agora utilizam texturas individuais.
                if (!this.anims.exists('walk')) {
                    this.anims.create({
                        key: 'walk',
                        frames: [
                            { key: 'miguel_walk_1' },
                            { key: 'miguel_walk_2' },
                            { key: 'miguel_walk_3' }
                        ],
                        frameRate: 8,
                        repeat: -1
                    });

                    this.anims.create({
                        key: 'idle',
                        frames: [
                            { key: 'miguel_idle' }
                        ],
                        frameRate: 1,
                        repeat: -1
                    });

                    this.anims.create({
                        key: 'jump',
                        frames: [
                            { key: 'miguel_jump' }
                        ],
                        frameRate: 1,
                        repeat: 0
                    });

                    this.anims.create({
                        key: 'jump_double',
                        frames: [
                            { key: 'miguel_double_jump' }
                        ],
                        frameRate: 1,
                        repeat: 0
                    });

                    this.anims.create({
                        key: 'attack',
                        frames: [
                            { key: 'miguel_punch' },
                            { key: 'miguel_punch' },
                            { key: 'miguel_idle' }
                        ],
                        frameRate: 10,
                        repeat: 0
                    });

                    this.anims.create({
                        key: 'power_cast',
                        frames: [
                            { key: 'miguel_power_cast' },
                            { key: 'miguel_power_cast' },
                            { key: 'miguel_idle' }
                        ],
                        frameRate: 10,
                        repeat: 0
                    });

                    this.anims.create({
                        key: 'dust_effect',
                        frames: [
                            { key: 'miguel_dust_1' },
                            { key: 'miguel_dust_2' },
                            { key: 'miguel_dust_3' }
                        ],
                        frameRate: 12,
                        repeat: 0
                    });

                    this.anims.create({
                        key: 'hurt',
                        frames: [
                            { key: 'miguel_hurt' }
                        ],
                        frameRate: 1,
                        repeat: 0
                    });

                    this.anims.create({
                        key: 'victory',
                        frames: [
                            { key: 'miguel_victory' }
                        ],
                        frameRate: 1,
                        repeat: -1
                    });

                    this.anims.create({
                        key: 'robo_patrol',
                        frames: this.anims.generateFrameNumbers(
                            'robo',
                            { start: 0, end: 2 }
                        ),
                        frameRate: 8,
                        repeat: -1
                    });

                    this.anims.create({
                        key: 'robo_damage',
                        frames: this.anims.generateFrameNumbers(
                            'robo',
                            { start: 3, end: 5 }
                        ),
                        frameRate: 12,
                        repeat: 0
                    });

                    this.anims.create({
                        key: 'robo_explosion',
                        frames: this.anims.generateFrameNumbers(
                            'robo',
                            { start: 6, end: 8 }
                        ),
                        frameRate: 16,
                        repeat: 0
                    });
                }

                this.vilao.anims.play(
                    'robo_patrol',
                    true
                );

                // CONTROLES UNIFICADOS
                this.controles = (
                    new window.MiguelInputManager(
                        this,
                        {
                            tutorial: true
                        }
                    )
                );

                this.controles.iniciar();

                this.hudJogo = (
                    new window.MiguelHUDManager(
                        this,
                        {
                            nome: this.nome,
                            pontos: this.pontos,
                            tipoFase:
                                'TUTORIAL',
                            totalEtapas: 7
                        }
                    )
                );

                this.hudJogo.iniciar();

                this.sistemaVida = (
                    new window.MiguelHealthManager(
                        this,
                        this.player,
                        {
                            vidaMaxima: 100,
                            vidas: 3,

                            hud:
                                this.hudJogo,

                            duracaoInvulnerabilidade:
                                1100,

                            respawnX: 50,
                            respawnY: 320,

                            onDamage: (evento) => {
                                if (this.tutorial) {
                                    this.tutorial.registrarAcao(
                                        'dano-robo',
                                        evento
                                    );

                                    this.tutorial
                                        .mostrarDicaTemporaria(
                                            'Você perdeu vida! '
                                            + 'Use o golpe para '
                                            + 'derrotar este robô.'
                                        );
                                }
                            },

                            onLifeLost: () => {
                                if (this.tutorial) {
                                    this.tutorial
                                        .mostrarDicaTemporaria(
                                            'Você perdeu um coração.'
                                        );
                                }
                            },

                            onRespawn: () => {
                                if (this.tutorial) {
                                    this.tutorial
                                        .mostrarDicaTemporaria(
                                            'Tente novamente!'
                                        );
                                }
                            },

                            onGameOver: () => {
                                if (this.tutorial) {
                                    this.tutorial
                                        .mostrarDicaTemporaria(
                                            'Vamos recomeçar '
                                            + 'o treinamento.'
                                        );
                                }

                                this.time.delayedCall(
                                    1000,
                                    () => {
                                        this.registry.set(
                                            'pontuacao',
                                            0
                                        );

                                        this.scene.restart();
                                    }
                                );
                            }
                        }
                    )
                );

                this.sistemaVida.iniciar();

                this.tutorial = (
                    new window.MiguelTutorialManager(
                        this,
                        {
                            hud:
                                this.hudJogo,

                            totalCristais:
                                this.cristais
                                    .countActive(true),

                            onComplete: () => {
                                this.registry.set(
                                    'tutorialConcluido',
                                    true
                                );

                                this.scene.start(
                                    'ResultadoTutorial'
                                );
                            }
                        }
                    )
                );

                this.tutorial.iniciar();
            }

            sincronizarGiroDuplo() {
                if (
                    !this.player.giroDuploAtivo
                    || !this.doubleJumpVisual.visible
                ) {
                    return;
                }

                const escalaBase = 0.95;

                const deslocamentoX = (
                    (127.5 - 128)
                    * escalaBase
                );

                const deslocamentoY = (
                    (163 - 128)
                    * escalaBase
                );

                this.doubleJumpVisual.setPosition(
                    this.player.x + deslocamentoX,
                    this.player.y + deslocamentoY
                );

                this.doubleJumpVisual.setFlipX(
                    this.player.flipX
                );
            }

            cancelarGiroDuplo() {
                if (this.tweenGiroDuplo) {
                    this.tweenGiroDuplo.stop();
                    this.tweenGiroDuplo = null;
                }

                this.player.giroDuploAtivo = false;

                this.doubleJumpVisual
                    .setVisible(false)
                    .setAngle(0)
                    .setScale(1.02, 0.82);

                if (!this.player.estaEmPoeira) {
                    this.player.setVisible(true);
                }

                this.player.setAngle(0);
            }

            iniciarGiroDuplo() {
                this.cancelarGiroDuplo();

                this.player.giroDuploAtivo = true;
                this.player.setVisible(false);

                this.doubleJumpVisual
                    .setVisible(true)
                    .setAngle(0)
                    .setAlpha(1)
                    .setScale(1.02, 0.82)
                    .setFlipX(this.player.flipX);

                this.sincronizarGiroDuplo();

                const direcao = (
                    this.player.flipX
                    ? -1
                    : 1
                );

                this.tweenGiroDuplo = (
                    this.tweens.add({
                        targets:
                            this.doubleJumpVisual,

                        angle:
                            direcao * 360,

                        duration: 440,

                        ease:
                            'Cubic.easeInOut',

                        onUpdate: () => {
                            this.sincronizarGiroDuplo();
                        },

                        onComplete: () => {
                            this.player
                                .giroDuploAtivo = false;

                            this.tweenGiroDuplo = null;

                            this.doubleJumpVisual
                                .setVisible(false)
                                .setAngle(0)
                                .setScale(1.02, 0.82);

                            if (
                                !this.player
                                    .estaEmPoeira
                            ) {
                                this.player
                                    .setVisible(true);
                            }

                            this.player.setAngle(0);
                        }
                    })
                );
            }

            cancelarPoeira() {
                if (!this.player.estaEmPoeira) {
                    return;
                }

                this.poeira.anims.stop();

                this.poeira.off(
                    'animationcomplete-dust_effect'
                );

                this.poeira.setVisible(false);
                this.player.estaEmPoeira = false;

                if (
                    !this.player.giroDuploAtivo
                ) {
                    this.player.setVisible(true);
                }
            }

            sincronizarAgachamento() {
                if (
                    !this.player.estaAgachado
                    || !this.crouchVisual.visible
                ) {
                    return;
                }

                // O ponto inferior do frame recolhido
                // permanece alinhado aos pés do sprite idle.
                this.crouchVisual.setPosition(
                    this.player.x,
                    this.player.y + 91
                );

                this.crouchVisual.setFlipX(
                    this.player.flipX
                );
            }

            entrarAgachamento() {
                if (
                    this.player.estaAgachado
                    || this.player.estaAtacando
                    || this.player.estaMachucado
                    || this.player.giroDuploAtivo
                ) {
                    return;
                }

                this.cancelarPoeira();
                this.cancelarGiroDuplo();

                this.player.estaAgachado = true;

                this.player.setVelocityX(0);
                this.player.anims.stop();
                this.player.setVisible(false);

                this.player.body.setSize(
                    this.player.corpoAgachado
                        .largura,

                    this.player.corpoAgachado
                        .altura
                );

                this.player.body.setOffset(
                    this.player.corpoAgachado
                        .offsetX,

                    this.player.corpoAgachado
                        .offsetY
                );

                if (
                    typeof this.player.body
                        .updateFromGameObject
                        === 'function'
                ) {
                    this.player.body
                        .updateFromGameObject();
                }

                this.crouchVisual
                    .setVisible(true)
                    .setAngle(0)
                    .setScale(
                        1.02,
                        0.72
                    );

                this.sincronizarAgachamento();

                if (this.tutorial) {
                    this.tutorial.registrarAcao(
                        'agachamento'
                    );
                }
            }

            sairAgachamento(
                forcar = false
            ) {
                if (
                    !this.player.estaAgachado
                    && !forcar
                ) {
                    return;
                }

                this.player.estaAgachado = false;

                if (this.crouchVisual) {
                    this.crouchVisual
                        .setVisible(false)
                        .setAngle(0);
                }

                if (this.player.body) {
                    this.player.body.setSize(
                        this.player.corpoPadrao
                            .largura,

                        this.player.corpoPadrao
                            .altura
                    );

                    this.player.body.setOffset(
                        this.player.corpoPadrao
                            .offsetX,

                        this.player.corpoPadrao
                            .offsetY
                    );

                    if (
                        typeof this.player.body
                            .updateFromGameObject
                            === 'function'
                    ) {
                        this.player.body
                            .updateFromGameObject();
                    }
                }

                if (
                    !this.player.estaMachucado
                    && !this.player.estaAtacando
                    && !this.player.estaEmPoeira
                    && !this.player.giroDuploAtivo
                ) {
                    this.player.setVisible(true);
                }
            }

            atualizarAgachamento(
                noChao,
                podeControlar,
                descer
            ) {
                const podeAgachar = Boolean(
                    podeControlar
                    && noChao
                    && !this.player.estaAtacando
                    && !this.player.estaMachucado
                );

                if (
                    podeAgachar
                    && descer
                ) {
                    this.entrarAgachamento();
                    this.sincronizarAgachamento();
                    return;
                }

                this.sairAgachamento();
            }

            update(time, delta) {
                if (this.visualCenario) {
                    this.visualCenario.atualizar(
                        time,
                        delta,
                        this.player
                        ? this.player.x
                        : 400
                    );
                }

                if (this.controles) {
                    this.controles.atualizar();

                    if (this.hudJogo) {
                        this.hudJogo
                            .atualizarDispositivo(
                                this.controles
                                    .ultimoDispositivo
                            );

                        this.hudJogo
                            .atualizarVisibilidade(
                                this.player
                            );
                    }
                }

                const noChao = Boolean(
                    this.player.body.blocked.down
                    || this.player.body.touching.down
                );

                if (
                    this.controles
                    && this.controles
                        .consumirReiniciar()
                ) {
                    this.registry.set(
                        'pontuacao',
                        0
                    );

                    this.scene.restart();
                    return;
                }

                if (
                    noChao
                    && !this.player.estavaNoChao
                ) {
                    this.player.pulosDisponiveis = 2;

                    this.cancelarGiroDuplo();
                    this.tocarPoeira();
                } else if (noChao) {
                    this.player.pulosDisponiveis = 2;
                }

                if (
                    this.vilao
                    && this.vilao.active
                ) {
                    if (
                        this.vilao.x
                        <= this.vilao.limiteEsquerda
                    ) {
                        this.vilao.x = (
                            this.vilao
                                .limiteEsquerda
                        );

                        this.vilao.direcao = 1;
                        this.vilao.setVelocityX(90);
                    } else if (
                        this.vilao.x
                        >= this.vilao.limiteDireita
                    ) {
                        this.vilao.x = (
                            this.vilao
                                .limiteDireita
                        );

                        this.vilao.direcao = -1;
                        this.vilao.setVelocityX(-90);
                    }
                }

                const podeControlar = Boolean(
                    !this.player.estaMachucado
                    && !(
                        this.sistemaVida
                        && this.sistemaVida.morto
                    )
                );

                const eixoX = (
                    this.controles
                    ? this.controles
                        .obterMovimentoX()
                    : 0
                );

                const eixoY = (
                    this.controles
                    ? this.controles
                        .obterMovimentoY()
                    : 0
                );

                const descer = eixoY > 0.55;

                this.atualizarAgachamento(
                    noChao,
                    podeControlar,
                    descer
                );

                const esquerda = eixoX < -0.16;
                const direita = eixoX > 0.16;

                if (
                    podeControlar
                    && !this.player.estaAgachado
                    && esquerda
                    && !direita
                ) {
                    this.player.setVelocityX(
                        -220 * Math.max(
                            0.38,
                            Math.abs(eixoX)
                        )
                    );

                    this.player.setFlipX(true);

                    if (
                        noChao
                        && !this.player.estaAtacando
                        && !this.player.estaEmPoeira
                    ) {
                        this.player.anims.play(
                            'walk',
                            true
                        );
                    }
                } else if (
                    podeControlar
                    && !this.player.estaAgachado
                    && direita
                    && !esquerda
                ) {
                    this.player.setVelocityX(
                        220 * Math.max(
                            0.38,
                            Math.abs(eixoX)
                        )
                    );

                    this.player.setFlipX(false);

                    if (
                        noChao
                        && !this.player.estaAtacando
                        && !this.player.estaEmPoeira
                    ) {
                        this.player.anims.play(
                            'walk',
                            true
                        );
                    }
                } else if (
                    podeControlar
                    && !this.player.estaAgachado
                ) {
                    this.player.setVelocityX(0);

                    if (
                        noChao
                        && !this.player.estaAtacando
                        && !this.player.estaEmPoeira
                    ) {
                        this.player.anims.play(
                            'idle',
                            true
                        );
                    }
                } else if (
                    podeControlar
                    && this.player.estaAgachado
                ) {
                    this.player.setVelocityX(0);
                }

                if (this.tutorial) {
                    this.tutorial.registrarMovimento(
                        this.player.x
                    );
                }

                if (
                    podeControlar
                    && descer
                    && !noChao
                    && this.player.body.velocity.y
                        < 360
                ) {
                    this.player.setVelocityY(360);
                }

                const pediuPulo = Boolean(
                    this.controles
                    && this.controles
                        .consumirPulo()
                );

                if (
                    pediuPulo
                    && podeControlar
                ) {
                    this.sairAgachamento(true);
                    this.executarPulo(noChao);
                }

                const pediuAtaque = Boolean(
                    this.controles
                    && this.controles
                        .consumirAtaque()
                );

                if (
                    pediuAtaque
                    && podeControlar
                ) {
                    this.sairAgachamento(true);
                    this.executarAtaque();
                }

                if (
                    !noChao
                    && !this.player.estaAtacando
                    && !this.player.giroDuploAtivo
                    && !this.player.estaEmPoeira
                    && !this.player.estaMachucado
                    && !this.player.estaAgachado
                ) {
                    const animacaoPulo = (
                        this.player
                            .pulosDisponiveis === 0
                        ? 'jump_double'
                        : 'jump'
                    );

                    this.player.anims.play(
                        animacaoPulo,
                        true
                    );
                }

                if (
                    this.player.giroDuploAtivo
                ) {
                    this.sincronizarGiroDuplo();
                }

                if (this.player.estaEmPoeira) {
                    this.poeira.setPosition(
                        this.player.x,
                        this.player.y
                    );

                    this.poeira.setFlipX(
                        this.player.flipX
                    );
                }

                if (this.player.estaAgachado) {
                    this.sincronizarAgachamento();
                }

                this.player.estavaNoChao = noChao;
            }

            executarPulo(noChao) {
                this.sairAgachamento(true);
                this.cancelarPoeira();

                if (noChao) {
                    this.player.pulosDisponiveis = 1;

                    this.player.setVelocityY(-520);

                    if (this.tutorial) {
                        this.tutorial.registrarAcao(
                            'pulo'
                        );
                    }

                    if (!this.player.estaAtacando) {
                        this.player.anims.play(
                            'jump',
                            true
                        );
                    }

                    return;
                }

                if (
                    this.player.pulosDisponiveis > 0
                ) {
                    this.player.pulosDisponiveis = 0;
                    this.player.setVelocityY(-500);

                    if (this.tutorial) {
                        this.tutorial.registrarAcao(
                            'pulo-duplo'
                        );
                    }

                    this.iniciarGiroDuplo();
                }
            }

            executarAtaque() {
                if (
                    this.player.estaAtacando
                    || this.player.estaMachucado
                    || (
                        this.sistemaVida
                        && this.sistemaVida.morto
                    )
                ) {
                    return;
                }

                this.sairAgachamento(true);
                this.cancelarGiroDuplo();
                this.cancelarPoeira();

                this.player.estaAtacando = true;
                this.player.anims.play('attack', true);
                this.player.once('animationcomplete-attack', () => {
                    this.player.estaAtacando = false;
                });

                const alcance = 70;
                const direcao = this.player.flipX ? -1 : 1;
                const areaAtaque = new Phaser.Geom.Rectangle(
                    this.player.x + (direcao > 0 ? 10 : -alcance - 10),
                    this.player.y - 45,
                    alcance,
                    90
                );

                if (
                    this.vilao
                    && this.vilao.active
                    && Phaser.Geom.Rectangle.Overlaps(
                        areaAtaque,
                        this.vilao.getBounds()
                    )
                ) {
                    const podeDestruir = Boolean(
                        !this.tutorial
                        || this.tutorial
                            .podeDerrotarRobo()
                    );

                    if (podeDestruir) {
                        this.destruirVilao(
                            this.vilao,
                            'ataque'
                        );
                    } else {
                        this.vilao.anims.play(
                            'robo_damage',
                            true
                        );

                        this.vilao.off(
                            'animationcomplete-robo_damage'
                        );

                        this.vilao.once(
                            'animationcomplete-robo_damage',
                            () => {
                                if (
                                    this.vilao
                                    && this.vilao.active
                                ) {
                                    this.vilao.anims.play(
                                        'robo_patrol',
                                        true
                                    );
                                }
                            }
                        );

                        this.tutorial
                            .mostrarDicaTemporaria(
                                'Primeiro descubra '
                                + 'o perigo de encostar '
                                + 'no robô.'
                            );
                    }
                }
            }

            tocarPoeira() {
                if (
                    this.player.estaAtacando
                    || this.player.estaMachucado
                    || this.player.estaAgachado
                ) {
                    return;
                }

                this.cancelarPoeira();

                this.player.estaEmPoeira = true;

                // Mesma posição, escala e orientação do player.
                // Não utiliza body.bottom porque os frames de
                // poeira possuem canvas completo de 256x256.
                this.poeira.setPosition(
                    this.player.x,
                    this.player.y
                );

                this.poeira.setScale(
                    this.player.scaleX,
                    this.player.scaleY
                );

                this.poeira.setFlipX(
                    this.player.flipX
                );

                this.player.setVisible(false);
                this.poeira.setVisible(true);

                this.poeira.anims.play(
                    'dust_effect',
                    true
                );

                this.poeira.off(
                    'animationcomplete-dust_effect'
                );

                this.poeira.once(
                    'animationcomplete-dust_effect',
                    () => {
                        this.poeira.setVisible(false);
                        this.player.estaEmPoeira = false;

                        if (
                            !this.player
                                .giroDuploAtivo
                        ) {
                            this.player
                                .setVisible(true);
                        }
                    }
                );
            }

            destruirVilao(
                vilao,
                causa = 'desconhecida'
            ) {
                if (
                    causa === 'ataque'
                    && this.tutorial
                ) {
                    this.tutorial.registrarAcao(
                        'ataque-robo'
                    );
                }

                vilao.setVelocity(0, 0);
                vilao.body.enable = false;
                vilao.anims.play('robo_explosion', true);
                vilao.once('animationcomplete-robo_explosion', () => vilao.disableBody(true, true));
            }

            coletarCristal(
                player,
                cristal
            ) {
                cristal.disableBody(true, true);

                this.pontos += 10;

                this.registry.set(
                    'pontuacao',
                    this.pontos
                );

                if (this.hudJogo) {
                    this.hudJogo
                        .atualizarPontuacao(
                            this.pontos
                        );
                }

                if (this.tutorial) {
                    this.tutorial.registrarAcao(
                        'cristal',
                        {
                            restantes:
                                this.cristais
                                    .countActive(true)
                        }
                    );
                } else if (
                    this.cristais
                        .countActive(true) === 0
                ) {
                    // Fallback defensivo para uma cena
                    // criada sem o gerenciador.
                    this.scene.start(
                        'ResultadoTutorial'
                    );
                }
            }

            acertarVilao(
                player,
                vilao
            ) {
                if (
                    !vilao
                    || !vilao.active
                    || !this.sistemaVida
                ) {
                    return;
                }

                const pisouNoVilao = Boolean(
                    player.body.velocity.y > 0
                    && player.body.bottom
                        <= vilao.body.top + 24
                );

                const dano = (
                    pisouNoVilao
                    ? vilao.danoPisao
                    : vilao.danoContato
                );

                const direcaoRecuo = (
                    player.x < vilao.x
                    ? -1
                    : 1
                );

                const danoAplicado = (
                    this.sistemaVida.receberDano(
                        dano,
                        {
                            origem:
                                vilao.tipoInimigo,

                            forma:
                                pisouNoVilao
                                ? 'pisao'
                                : 'contato',

                            direcao:
                                direcaoRecuo,

                            impulsoX:
                                pisouNoVilao
                                ? 220
                                : 280,

                            impulsoY:
                                pisouNoVilao
                                ? -340
                                : -220
                        }
                    )
                );

                if (
                    danoAplicado
                    && this.tutorial
                ) {
                    this.tutorial.registrarAcao(
                        'dano-robo',
                        {
                            forma:
                                pisouNoVilao
                                ? 'pisao'
                                : 'contato',

                            dano
                        }
                    );
                }
            }
        }

        // ==========================================
        // CENA 3: RESULTADO DO TUTORIAL
        // ==========================================
        class ResultadoTutorial
            extends Phaser.Scene
        {
            constructor() {
                super('ResultadoTutorial');
            }

            create() {
                GERENCIADOR_DISPOSITIVO
                    .ativarFase(
                        CONFIGURACAO_FASES
                            .fases
                            .ResultadoTutorial
                    );

                let nome = this.registry.get('nomeJogador');
                let pontosFinal = this.registry.get('pontuacao');

                this.add.image(
                    175,
                    275,
                    'miguel_victory'
                )
                    .setScale(1.05)
                    .setDepth(5);

                this.add.text(
                    505,
                    175,
                    'TREINAMENTO CONCLUÍDO!',
                    {
                        fontSize: '38px',
                        fill: '#00FF66',
                        fontStyle: 'bold'
                    }
                ).setOrigin(0.5);

                this.add.text(
                    505,
                    275,
                    `HERÓI: ${nome}`,
                    {
                        fontSize: '26px',
                        fill: '#FFF'
                    }
                ).setOrigin(0.5);

                this.add.text(
                    505,
                    335,
                    `PONTOS: ${pontosFinal}`,
                    {
                        fontSize: '32px',
                        fill: '#FFCC00',
                        fontStyle: 'bold'
                    }
                ).setOrigin(0.5);

                const botaoAventura = (
                    this.add.text(
                        505,
                        425,
                        '[ COMEÇAR A AVENTURA ]',
                        {
                            fontSize: '22px',
                            fill: '#0d1117',
                            backgroundColor:
                                '#28ff9b',
                            padding: {
                                x: 18,
                                y: 12
                            },
                            fontStyle: 'bold'
                        }
                    )
                ).setOrigin(0.5);

                botaoAventura.setInteractive({
                    useHandCursor: true
                });

                botaoAventura.on(
                    'pointerdown',
                    async () => {
                        await GERENCIADOR_DISPOSITIVO
                            .entrarModoJogo(
                                CONFIGURACAO_FASES
                                    .fases
                                    .Fase1
                            );

                        this.scene.start(
                            'Fase1'
                        );
                    }
                );

                const botaoMenu = (
                    this.add.text(
                        505,
                        500,
                        '[ VOLTAR AO MENU ]',
                        {
                            fontSize: '20px',
                            fill: '#FFCC00',
                            fontStyle: 'bold'
                        }
                    )
                ).setOrigin(0.5);

                botaoMenu.setInteractive({
                    useHandCursor: true
                });

                botaoMenu.on(
                    'pointerdown',
                    () => {
                        GERENCIADOR_DISPOSITIVO
                            .desativarFase();

                        this.scene.start(
                            'MenuPrincipal'
                        );
                    }
                );
            }
        }

        // ==========================================
        // CENA 4: PRIMEIRA AVENTURA
        // ==========================================
        class Fase1 extends Phaser.Scene {
            constructor() {
                super('Fase1');
            }

            create() {
                GERENCIADOR_DISPOSITIVO
                    .ativarFase(
                        CONFIGURACAO_FASES
                            .fases
                            .Fase1
                    );

                this.cameras.main.setBackgroundColor(
                    '#081526'
                );

                this.add.rectangle(
                    400,
                    470,
                    800,
                    260,
                    0x123e58,
                    1
                );

                this.add.circle(
                    665,
                    105,
                    54,
                    0xffe89a,
                    0.92
                );

                for (
                    let indice = 0;
                    indice < 30;
                    indice += 1
                ) {
                    this.add.circle(
                        Phaser.Math.Between(
                            20,
                            780
                        ),

                        Phaser.Math.Between(
                            20,
                            280
                        ),

                        Phaser.Math.Between(
                            1,
                            3
                        ),

                        0xffffff,

                        Phaser.Math.FloatBetween(
                            0.35,
                            0.9
                        )
                    );
                }

                this.add.text(
                    400,
                    80,
                    'PRIMEIRA AVENTURA',
                    {
                        fontFamily:
                            'Courier New',

                        fontSize:
                            '38px',

                        color:
                            '#ffcc00',

                        fontStyle:
                            'bold'
                    }
                ).setOrigin(0.5);

                this.add.text(
                    400,
                    140,
                    'FASE 1',
                    {
                        fontFamily:
                            'Courier New',

                        fontSize:
                            '26px',

                        color:
                            '#8fe9ff',

                        fontStyle:
                            'bold'
                    }
                ).setOrigin(0.5);

                this.add.image(
                    400,
                    315,
                    'miguel_idle'
                ).setScale(1.05);

                this.add.text(
                    400,
                    430,
                    'A estrutura da primeira fase '
                    + 'está pronta para receber '
                    + 'o cenário, os inimigos '
                    + 'e o chefe.',
                    {
                        fontFamily:
                            'Courier New',

                        fontSize:
                            '17px',

                        color:
                            '#ffffff',

                        align:
                            'center',

                        wordWrap: {
                            width: 620
                        }
                    }
                ).setOrigin(0.5);

                const botaoMenu = (
                    this.add.text(
                        400,
                        535,
                        '[ VOLTAR AO MENU ]',
                        {
                            fontFamily:
                                'Courier New',

                            fontSize:
                                '20px',

                            color:
                                '#ffcc00',

                            fontStyle:
                                'bold'
                        }
                    )
                ).setOrigin(0.5);

                botaoMenu.setInteractive({
                    useHandCursor: true
                });

                botaoMenu.on(
                    'pointerdown',
                    () => {
                        GERENCIADOR_DISPOSITIVO
                            .desativarFase();

                        this.scene.start(
                            'MenuPrincipal'
                        );
                    }
                );
            }
        }

        // ==========================================
        // CONFIGURAÇÕES GERAIS (ESCAlA MOBILE-FIRST)
        // ==========================================
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: 800,
            height: 600,
            backgroundColor: '#0d1117', // Fundo escuro de altíssimo contraste
            scale: {
                mode: Phaser.Scale.FIT, // Faz o jogo expandir e caber perfeitamente em telas de qualquer celular
                autoCenter: Phaser.Scale.NO_CENTER
            },
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 750 }, debug: false }
            },
            scene: [
                MenuPrincipal,
                Tutorial,
                ResultadoTutorial,
                Fase1
            ]
        };

        const game = new Phaser.Game(config);

        const obterViewportJogo = () => {
            const viewport = window.visualViewport;
