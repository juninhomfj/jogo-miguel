<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>As Aventuras do Miguel</title>

    <script src="js/phase-config.js?v=robot-states-base-20260717-042932"></script>
    <script src="js/device-manager.js?v=robot-states-base-20260717-042932"></script>
    <script src="js/settings-manager.js?v=robot-states-base-20260717-042932"></script>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="js/scene-visuals.js?v=robot-states-base-20260717-042932"></script>
    <script src="js/mobile-controls.js?v=robot-states-base-20260717-042932"></script>
    <script src="js/input-manager.js?v=robot-states-base-20260717-042932"></script>
    <script src="js/hud-manager.js?v=robot-states-base-20260717-042932"></script>
    <script src="js/health-manager.js?v=robot-states-base-20260717-042932"></script>
    <script src="js/tutorial-manager.js?v=robot-states-base-20260717-042932"></script>
    <script src="js/rotation-manager.js?v=robot-states-base-20260717-042932"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        html,
        body,
        #game-container,
        canvas {
            touch-action: none;
            overscroll-behavior: none;
        }
        body {
            background-color: #0d1117;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Caixa de Input de Nome Estilo Arcade Retro (Mobile Friendly) */
        #name-input-container {
            position: absolute;
            display: none; /* Controlado dinamicamente pelo Phaser */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: rgba(20, 25, 35, 0.95);
            border: 4px solid #FFCC00;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.5);
            width: 85%;
            max-width: 340px;
        }
        #name-input-container label {
            font-size: 18px;
            color: #FFCC00;
            margin-bottom: 12px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #player-name-input {
            width: 100%;
            padding: 12px;
            font-size: 26px;
            text-align: center;
            text-transform: uppercase;
            border: 2px solid #FFCC00;
            background: #111;
            color: #FFF;
            font-family: inherit;
            font-weight: bold;
            letter-spacing: 4px;
            outline: none;
            border-radius: 6px;
        }
        #start-button {
            margin-top: 18px;
            width: 100%;
            padding: 14px;
            font-size: 20px;
            background: #FFCC00;
            color: #0d1117;
            border: none;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 0 #CC9900;
        }
        #start-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #CC9900;
        }

        #orientation-overlay {
            position: fixed;
            inset: 0;

            display: flex;
            justify-content: center;
            align-items: center;

            padding:
                max(20px, env(safe-area-inset-top))
                max(20px, env(safe-area-inset-right))
                max(20px, env(safe-area-inset-bottom))
                max(20px, env(safe-area-inset-left));

            background:
                rgba(6, 10, 18, 0.97);

            z-index: 1000;

            opacity: 0;
            visibility: hidden;
            pointer-events: none;

            transition:
                opacity 160ms ease,
                visibility 160ms ease;
        }

        #orientation-overlay.is-visible {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .orientation-card {
            width: min(92vw, 460px);

            padding: 28px 22px;

            border: 4px solid #FFCC00;
            border-radius: 18px;

            background: #101621;

            text-align: center;

            box-shadow:
                0 0 32px
                rgba(255, 204, 0, 0.38);
        }

        .orientation-icon {
            display: block;

            margin-bottom: 12px;

            color: #FFCC00;

            font-size: 68px;
            line-height: 1;
        }

        .orientation-card h2 {
            margin: 0 0 12px;

            color: #FFCC00;

            font-size: clamp(24px, 7vw, 38px);
            letter-spacing: 2px;
        }

        .orientation-card p {
            margin: 0 auto 18px;

            max-width: 380px;

            color: #FFFFFF;

            font-size: clamp(15px, 4vw, 19px);
            line-height: 1.45;
        }

        .orientation-actions {
            display: grid;
            gap: 12px;
        }

        .orientation-actions button {
            width: 100%;

            padding: 14px 16px;

            border: 0;
            border-radius: 8px;

            font-family: inherit;
            font-size: 17px;
            font-weight: bold;

            cursor: pointer;
        }

        #orientation-action {
            color: #101621;
            background: #FFCC00;

            box-shadow: 0 4px 0 #B88A00;
        }

        #sensor-action {
            color: #FFFFFF;

            border: 2px solid #00E5FF;

            background: #183244;
        }

        #sensor-action:disabled {
            opacity: 0.65;
            cursor: default;
        }

        /*
         * O sensor físico é apenas diagnóstico.
         * Ele não é necessário para liberar o tutorial.
         */
        #sensor-action,
        #orientation-status {
            display: none !important;
        }

        #orientation-status {
            display: block;

            margin-top: 16px;

            color: #8FE9FF;

            font-size: 12px;
            line-height: 1.4;
        }

        canvas {
            display: block;

            max-width: 100%;
            max-height: 100%;

            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        @media (
            orientation: landscape
        ) and (
            max-height: 520px
        ) {
            #name-input-container {
                width: min(82vw, 320px);
                padding: 14px;
            }

            #name-input-container label {
                margin-bottom: 7px;
                font-size: 15px;
            }

            #player-name-input {
                padding: 8px;
                font-size: 21px;
            }

            #start-button {
                margin-top: 10px;
                padding: 10px;
                font-size: 17px;
            }
        }


        /*
         * Centralização controlada somente pelo CSS.
         * Phaser calcula a escala, enquanto o Grid
         * posiciona o canvas no centro da área visível.
         */
        :root {
            --app-width: 100vw;
            --app-height: 100dvh;
        }

        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000000;
        }

        body {
            position: fixed;
            inset: 0;

            width: 100%;
            height: 100%;

            display: block;

            overflow: hidden;
            background: #000000;
        }

        #game-container {
            position: fixed;
            inset: 0;

            width: var(--app-width);
            height: var(--app-height);

            min-width: 0;
            min-height: 0;

            display: grid;
            place-items: center;

            overflow: hidden;
            background: #000000;

            padding:
                env(safe-area-inset-top)
                env(safe-area-inset-right)
                env(safe-area-inset-bottom)
                env(safe-area-inset-left);
        }

        #game-container:fullscreen,
        #game-container:-webkit-full-screen {
            width: 100%;
            height: 100%;
        }

        #game-container > canvas {
            grid-area: 1 / 1;

            position: relative !important;

            left: auto !important;
            right: auto !important;
            top: auto !important;
            bottom: auto !important;

            margin: 0 !important;

            align-self: center;
            justify-self: center;
        }


        #game-container > canvas {
            opacity: 1;

            transition:
                opacity 140ms linear;
        }

        #game-container.layout-settling > canvas,
        #game-container.orientation-blocked > canvas {
            opacity: 0;
        }


        /*
         * A geometria do aviso é independente do canvas.
         * Quando o navegador continua bloqueado em
         * paisagem, somente esta camada é girada.
         */
        #orientation-overlay {
            padding: 0;
            overflow: hidden;

            transform: translateZ(0);
        }

        #orientation-rotator {
            position: absolute;
            left: 50%;
            top: 50%;

            width:
                var(
                    --orientation-stage-width,
                    100dvw
                );

            height:
                var(
                    --orientation-stage-height,
                    100dvh
                );

            display: grid;
            place-items: center;

            padding:
                max(
                    14px,
                    env(safe-area-inset-top)
                )
                max(
                    14px,
                    env(safe-area-inset-right)
                )
                max(
                    14px,
                    env(safe-area-inset-bottom)
                )
                max(
                    14px,
                    env(safe-area-inset-left)
                );

            transform:
                translate(-50%, -50%)
                rotate(
                    var(
                        --orientation-rotation,
                        0deg
                    )
                );

            transform-origin: center center;

            transition:
                transform 130ms ease;
        }

        #orientation-rotator .orientation-card {
            width:
                min(
                    calc(100% - 28px),
                    460px
                );

            max-height:
                calc(100% - 28px);

            overflow-x: hidden;
            overflow-y: auto;

            overscroll-behavior: contain;
            touch-action: pan-y;

            scrollbar-width: thin;
        }

        #orientation-overlay.is-rotated
        .orientation-card {
            width:
                min(
                    calc(100% - 24px),
                    430px
                );

            padding: 18px 16px;

            border-width: 3px;
        }

        #orientation-overlay.is-rotated
        .orientation-icon {
            margin-bottom: 7px;
            font-size: 48px;
        }

        #orientation-overlay.is-rotated
        .orientation-card h2 {
            margin-bottom: 8px;

            font-size:
                clamp(
                    22px,
                    7vw,
                    32px
                );

            line-height: 1.15;
        }

        #orientation-overlay.is-rotated
        .orientation-card p {
            margin-bottom: 12px;

            font-size:
                clamp(
                    14px,
                    4vw,
                    17px
                );

            line-height: 1.35;
        }

        #orientation-overlay.is-rotated
        .orientation-actions {
            gap: 8px;
        }

        #orientation-overlay.is-rotated
        .orientation-actions button {
            padding: 10px 12px;
            font-size: 14px;
        }

        #orientation-overlay.is-rotated
        #orientation-status {
            margin-top: 9px;

            font-size: 10px;

            overflow-wrap: anywhere;
        }

        #game-container.orientation-transitioning
        > canvas,

        #game-container.orientation-blocked
        > canvas {
            opacity: 0;

            pointer-events: none;
        }


        /*
         * O formulário do menu usa as áreas livres da
         * tela física. Em aparelhos compridos ele fica
         * lateralmente, preservando a arte do canvas.
         */
        @media (pointer: coarse) {
            #name-input-container {
                position: fixed;

                left: 50%;
                right: auto;
                top: auto;

                bottom:
                    max(
                        12px,
                        env(
                            safe-area-inset-bottom
                        )
                    );

                width:
                    min(
                        88vw,
                        320px
                    );

                max-width: none;

                padding: 13px;

                border-width: 3px;
                border-radius: 10px;

                transform:
                    translateX(-50%);

                z-index: 120;

                box-shadow:
                    0 0 18px
                    rgba(
                        255,
                        204,
                        0,
                        0.34
                    );
            }

            #name-input-container label {
                margin-bottom: 7px;
                font-size: 14px;
                letter-spacing: 1px;
            }

            #player-name-input {
                padding: 8px;
                font-size: 20px;
            }

            #start-button {
                margin-top: 9px;
                padding: 10px;
                font-size: 15px;
            }
        }

        @media (
            pointer: coarse
        ) and (
            orientation: landscape
        ) {
            #name-input-container {
                left: auto;

                right:
                    max(
                        12px,
                        env(
                            safe-area-inset-right
                        )
                    );

                top: 50%;
                bottom: auto;

                width:
                    clamp(
                        218px,
                        25vw,
                        300px
                    );

                max-height:
                    calc(
                        100dvh - 20px
                    );

                padding: 12px;

                transform:
                    translateY(-50%);
            }
        }

        @media (
            pointer: coarse
        ) and (
            orientation: landscape
        ) and (
            min-aspect-ratio: 19 / 9
        ) {
            #name-input-container {
                right:
                    max(
                        16px,
                        3vw,
                        env(
                            safe-area-inset-right
                        )
                    );

                width:
                    clamp(
                        210px,
                        21vw,
                        280px
                    );
            }
        }


        /*
         * O jogo bloqueia zoom, seleção e gestos
         * do navegador durante a jogabilidade.
         */
        html,
        body,
        #game-container,
        #game-container canvas {
            touch-action: none !important;
            -ms-touch-action: none !important;

            overscroll-behavior: none;

            -webkit-touch-callout: none;
            -webkit-user-drag: none;
        }

    </style>
</head>
<body>

    <div id="game-container">
        <div
            id="orientation-overlay"
            aria-hidden="true"
        >
            <div id="orientation-rotator">
                <div class="orientation-card">
                <span
                    class="orientation-icon"
                    aria-hidden="true"
                >↻</span>

                <h2 id="orientation-title">
                    GIRE PARA HORIZONTAL
                </h2>

                <p id="orientation-message">
                    Esta fase foi criada para jogar
                    com o celular deitado.
                </p>

                <div class="orientation-actions">
                    <button
                        id="orientation-action"
                        type="button"
                    >
                        TELA CHEIA E GIRAR
                    </button>

                    <button
                        id="sensor-action"
                        type="button"
                    >
                        ATIVAR SENSOR
                    </button>
                </div>

                <small id="orientation-status">
                    Verificando o aparelho...
                </small>
                </div>
            </div>
        </div>

        <div id="name-input-container">
            <label for="player-name-input">Nome do Herói</label>
            <input type="text" id="player-name-input" maxlength="3" placeholder="MIG" autocomplete="off">
            <button id="start-button">INICIAR TUTORIAL</button>
        </div>
    </div>

    <script>
        const CONFIGURACAO_FASES = (
            window.MIGUEL_PHASE_CONFIG
        );

        const GERENCIADOR_DISPOSITIVO = (
            window.MIGUEL_DEVICE_MANAGER
        );

        const GERENCIADOR_CONFIGURACOES = (
            window.MIGUEL_SETTINGS_MANAGER
        );

        GERENCIADOR_DISPOSITIVO.inicializar();
        GERENCIADOR_CONFIGURACOES.aplicar();

        window.__MIGUEL_BUILD_ID__ = 'robot-states-base-20260717-042932';

        console.info(
            '[MIGUEL BUILD]',
            window.__MIGUEL_BUILD_ID__
        );

        window.__MIGUEL_PHASES__ = (
            CONFIGURACAO_FASES
        );

        // ==========================================
        // CENA 1: MENU PRINCIPAL
        // ==========================================
        class MenuPrincipal extends Phaser.Scene {
            constructor() {
                super('MenuPrincipal');
            }

            preload() {
                // Alerta automático caso a imagem dê erro ao carregar do GitHub
                this.load.on('loaderror', function (file) {
                    alert("AVISO DEV: Não foi possível carregar a imagem '" + file.src + "'. Verifique se o nome está idêntico com letras minúsculas!");
                });

                // MIGUEL — 15 frames individuais aprovados.
                // Cada textura possui canvas RGBA de 256x256.
                this.load.image(
                    'miguel_idle',
                    'assets/frames/miguel/00_idle.png'
                );
                this.load.image(
                    'miguel_walk_1',
                    'assets/frames/miguel/01_walk_1.png'
                );
                this.load.image(
                    'miguel_walk_2',
                    'assets/frames/miguel/02_walk_2.png'
                );
                this.load.image(
                    'miguel_walk_3',
                    'assets/frames/miguel/03_walk_3.png'
                );
                this.load.image(
                    'miguel_jump',
                    'assets/frames/miguel/04_jump.png'
                );
                this.load.image(
                    'miguel_double_jump',
                    'assets/frames/miguel/05_double_jump.png'
                );
                this.load.image(
                    'miguel_crouch',
                    'assets/frames/miguel/14_crouch.png'
                );
                this.load.image(
                    'miguel_punch',
                    'assets/frames/miguel/06_punch.png'
                );
                this.load.image(
                    'miguel_power_cast',
                    'assets/frames/miguel/07_power_cast.png'
                );
                this.load.image(
                    'miguel_dust_1',
                    'assets/frames/miguel/08_dust_1.png'
                );
                this.load.image(
                    'miguel_dust_2',
                    'assets/frames/miguel/09_dust_2.png'
                );
                this.load.image(
                    'miguel_dust_3',
                    'assets/frames/miguel/10_dust_3.png'
                );
                this.load.image(
                    'miguel_reserved',
                    'assets/frames/miguel/11_reserved.png'
                );
                this.load.image(
                    'miguel_hurt',
                    'assets/frames/miguel/12_hurt.png'
                );
                this.load.image(
                    'miguel_victory',
                    'assets/frames/miguel/13_victory_trophy.png'
                );

                // ROBÔ — 15 frames individuais transparentes.
                this.load.image(
                    'robo_idle_1',
                    'assets/frames/robot/robot_idle_1.png'
                );
                this.load.image(
                    'robo_idle_2',
                    'assets/frames/robot/robot_idle_2.png'
                );
                this.load.image(
                    'robo_walk_1',
                    'assets/frames/robot/robot_walk_1.png'
                );
                this.load.image(
                    'robo_walk_2',
                    'assets/frames/robot/robot_walk_2.png'
                );
                this.load.image(
                    'robo_walk_3',
                    'assets/frames/robot/robot_walk_3.png'
                );
                this.load.image(
                    'robo_walk_4',
                    'assets/frames/robot/robot_walk_4.png'
                );
                this.load.image(
                    'robo_attack_charge',
                    'assets/frames/robot/robot_attack_charge.png'
                );
                this.load.image(
                    'robo_attack_fire',
                    'assets/frames/robot/robot_attack_fire.png'
                );
                this.load.image(
                    'robo_attack_recover',
                    'assets/frames/robot/robot_attack_recover.png'
                );
                this.load.image(
                    'robo_hit_1',
                    'assets/frames/robot/robot_hit_1.png'
                );
                this.load.image(
                    'robo_hit_2',
                    'assets/frames/robot/robot_hit_2.png'
                );
                this.load.image(
                    'robo_explode_1',
                    'assets/frames/robot/robot_explode_1.png'
                );
                this.load.image(
                    'robo_explode_2',
                    'assets/frames/robot/robot_explode_2.png'
                );
                this.load.image(
                    'robo_explode_3',
                    'assets/frames/robot/robot_explode_3.png'
                );
                this.load.image(
                    'robo_explode_4',
                    'assets/frames/robot/robot_explode_4.png'
                );

// Gera a textura do cristal tecnológico via código puro
                const graficoCristal = this.make.graphics({ x: 0, y: 0, add: false });
                graficoCristal.fillStyle(0x00E5FF, 0.35);
                graficoCristal.fillCircle(18, 18, 18);
                graficoCristal.fillStyle(0x00FFFF, 1);
                graficoCristal.fillPoints([
                    { x: 18, y: 0 },
                    { x: 34, y: 18 },
                    { x: 18, y: 36 },
                    { x: 2, y: 18 }
                ], true);
                graficoCristal.lineStyle(3, 0xE6FFFF, 1);
                graficoCristal.strokePoints([
                    { x: 18, y: 0 },
                    { x: 34, y: 18 },
                    { x: 18, y: 36 },
                    { x: 2, y: 18 }
                ], true);
                graficoCristal.lineStyle(2, 0x7DF9FF, 0.85);
                graficoCristal.lineBetween(18, 0, 18, 36);
                graficoCristal.lineBetween(2, 18, 34, 18);
                graficoCristal.fillStyle(0xFFFFFF, 0.9);
                graficoCristal.fillCircle(13, 10, 3);
                graficoCristal.generateTexture('cristalTecnologico', 36, 36);
                graficoCristal.destroy();
            }

            create() {
                GERENCIADOR_DISPOSITIVO
                    .desativarFase();

                this.visualMenu = (
                    new window.MiguelSceneVisuals(
                        this,
                        {
                            tipo: 'menu'
                        }
                    )
                );

                this.visualMenu.criarMenu();

                // Ativa e exibe a caixa de texto em HTML em cima do canvas
                const containerNome = document.getElementById('name-input-container');
                containerNome.style.display = 'flex';
                containerNome.style.visibility = 'visible';

                const botaoConfiguracoes = (
                    this.add.text(
                        22,
                        22,
                        '⚙ AJUSTES',
                        {
                            fontFamily:
                                'Courier New',

                            fontSize:
                                '16px',

                            color:
                                '#8fe9ff',

                            backgroundColor:
                                '#07111f',

                            padding: {
                                x: 12,
                                y: 8
                            },

                            fontStyle:
                                'bold'
                        }
                    )
                )
                    .setDepth(30)
                    .setInteractive({
                        useHandCursor: true
                    });

                botaoConfiguracoes.on(
                    'pointerdown',
                    () => {
                        GERENCIADOR_CONFIGURACOES
                            .marcarInteracaoUsuario();

                        containerNome.style.visibility =
                            'hidden';

                        containerNome.style.display =
                            'none';

                        this.scene.start(
                            'Configuracoes'
                        );
                    }
                );

                // Lógica ao clicar no botão "ENTRAR"
                const botaoEntrar = document.getElementById('start-button');
                botaoEntrar.onclick = async () => {
                    GERENCIADOR_CONFIGURACOES
                        .marcarInteracaoUsuario();

                    let nome = document.getElementById('player-name-input').value.trim();
                    if (!nome) nome = "MIG";
                    nome = nome.substring(0, 3).toUpperCase();

                    this.registry.set('nomeJogador', nome);
                    this.registry.set('pontuacao', 0);

                    // A ação do usuário permite solicitar
                    // tela cheia e orientação quando suportado.
                    await GERENCIADOR_DISPOSITIVO
                        .entrarModoJogo(
                            CONFIGURACAO_FASES
                                .fases
                                .Tutorial
                        );

                    // Inicia a fase e garante que a camada HTML não bloqueie o canvas.
                    this.scene.start('Tutorial');
                    containerNome.style.visibility = 'hidden';
                    containerNome.style.display = 'none';
                };
            }
        }

                )
                    .setOrigin(1, 0.5)
                    .setInteractive({
                        useHandCursor: true
                    });

                fundo.setInteractive({
                    useHandCursor: true
                });

                    GERENCIADOR_CONFIGURACOES
                        .marcarInteracaoUsuario();

                    definicao.acao();

                    GERENCIADOR_CONFIGURACOES
                        .vibrar(14);

                    this.atualizarLinhas();
                };

                fundo.on(
                    'pointerdown',
                    ativar
                );

                valor.on(
                    'pointerdown',
                    ativar
                );

                this.linhas.push({
                    valor,
                    obterValor:
                        definicao.valor
                });

                valor.setText(
                    definicao.valor()
                );
            }

            atualizarLinhas() {
                this.linhas.forEach(
                    (linha) => {
                        linha.valor.setText(
                            linha.obterValor()
                        );
                    }
                );

        class Tutorial extends Phaser.Scene {
            constructor() {
                super('Tutorial');
            }

            create() {
                /*
                 * A instância da cena é reutilizada pelo
                 * Phaser. A trava pertence somente à

                 */
                this.transicaoTutorialEmAndamento = false;
                console.log('Tutorial iniciado');

                GERENCIADOR_DISPOSITIVO
                    .ativarFase(
                        CONFIGURACAO_FASES
                            .fases
                            .Tutorial
                    );

                this.visualCenario = (

                        }
                    )
                );

                this.visualCenario
                    .criarTutorial();

                // Estado exibido pelo HUD consolidado.
                this.nome = (
                    this.registry.get(
                        'nomeJogador'
                    )
                    || 'MIG'
                );

                this.pontos = Number(
                    this.registry.get(
                        'pontuacao'
                    )
                    || 0
                );

                this.textoPlacar = null;

                // PLATAFORMAS (Alto contraste)
                this.plataformas = this.physics.add.staticGroup();

                // Chão tecnológico.
                let chao = this.add.rectangle(
                    400,
                    460,
                    800,
                    40,
                    0x16464a
                );

                this.visualCenario
                    .decorarPlataforma(
                        chao,
                        {
                            tipo: 'chao'
                        }
                    );

                this.physics.add.existing(
                    chao,
                    true
                );

                this.plataformas.add(chao);

                // Plataformas flutuantes do treinamento.
                let plat1 = this.add.rectangle(
                    600,
                    300,
                    180,
                    24,
                    0x1b5061
                );

                this.visualCenario
                    .decorarPlataforma(
                        plat1,
                        {
                            tipo: 'flutuante'
                        }
                    );

                this.physics.add.existing(
                    plat1,
                    true
                );

                this.plataformas.add(plat1);

                let plat2 = this.add.rectangle(
                    200,
                    200,
                    180,
                    24,
                    0x1b5061
                );

                this.visualCenario
                    .decorarPlataforma(
                        plat2,
                        {
                            tipo: 'flutuante'
                        }
                    );

                this.physics.add.existing(
                    plat2,
                    true
                );

                this.plataformas.add(plat2);

                // INIMIGO: robô vilão animado pelo spritesheet novo
                if (!this.textures.exists('particulaVilao')) {
                    const graficoParticula = this.make.graphics({ x: 0, y: 0, add: false });
                    graficoParticula.fillStyle(0xFF2222, 1);
                    graficoParticula.fillRect(0, 0, 8, 8);
                    graficoParticula.generateTexture('particulaVilao', 8, 8);
                    graficoParticula.destroy();
                }

                this.vilao = this.physics.add.sprite(
                    600,
                    384,
                    'robo_idle_1'
                );

                /*
                 * O canvas possui 1254x1254, mas o conteúdo
                 * visual ocupa apenas a região central.
                 */
                this.vilao.setScale(0.154);
                this.vilao.setCollideWorldBounds(false);
                this.vilao.setVelocityX(0);
                this.vilao.setBounce(0);
                this.vilao.setFlipX(false);

                /*
                 * Corpo físico concentrado no núcleo e nas
                 * pernas, ignorando antena e transparência.
                 */
                this.vilao.body.setSize(
                    420,
                    691
                );

                this.vilao.body.setOffset(
                    417,
                    300
                );

                this.vilao.larguraPatrulha = 90;

                this.vilao.limiteEsquerda = (
                    plat1.x
                    - (plat1.width / 2)
                    + (this.vilao.larguraPatrulha / 2)
                );

                this.vilao.limiteDireita = (
                    plat1.x
                    + (plat1.width / 2)
                    - (this.vilao.larguraPatrulha / 2)
                );

                this.vilao.direcao = 1;

                // Configuração reutilizável do inimigo.
                this.vilao.tipoInimigo = 'robo-tutorial';
                this.vilao.modoDerrota = 'attack';
                this.vilao.vida = 1;
                this.vilao.danoContato = 20;
                this.vilao.danoPisao = 20;

                this.ultimoDanoVilao = 0;

                /*
                 * Máquina de estados do robô.
                 *
                 * As capacidades de perseguição e ataque
                 * ficam independentes da fase, permitindo
                 * reutilizar o mesmo inimigo futuramente.
                 */
                this.vilao.estadoRobo = 'IDLE';
                this.vilao.estadoRoboDesde = 0;

                this.vilao.capacidades = {
                    detectar: true,
                    perseguir: true,
                    atacar: false
                };

                this.vilao.configuracaoComportamento = {
                    distanciaDeteccao: 230,
                    distanciaPerdaAlvo: 290,
                    distanciaParada: 135,
                    duracaoAlerta: 350,
                    velocidadePerseguicao: 120
                };

                // CRIANDO O MIGUEL
                this.player = this.physics.add.sprite(50, 320, 'miguel_idle');
                this.player.setScale(0.95);
                this.player.corpoPadrao = {
                    largura: 54,
                    altura: 116,
                    offsetX: 101,
                    offsetY: 108
                };

                this.player.corpoAgachado = {
                    largura: 54,
                    altura: 74,
                    offsetX: 101,
                    offsetY: 150
                };

                this.player.body.setSize(
                    this.player.corpoPadrao
                        .largura,

                    this.player.corpoPadrao
                        .altura
                );

                this.player.body.setOffset(
                    this.player.corpoPadrao
                        .offsetX,

                    this.player.corpoPadrao
                        .offsetY
                );

                this.player.pulosDisponiveis = 2;
                this.player.estaAtacando = false;
                this.player.estaEmPoeira = false;
                this.player.giroDuploAtivo = false;
                this.player.estaAgachado = false;
                this.player.agachamentoMantidoAte = 0;
                this.player.estavaNoChao = false;
                this.player.estaMachucado = false;
                this.player.setDepth(10);
                this.player.setCollideWorldBounds(true);

                this.physics.add.collider(this.player, this.plataformas);
                this.physics.add.collider(this.vilao, this.plataformas);
                this.physics.add.collider(this.player, this.vilao, this.acertarVilao, null, this);

                // Os frames de poeira contêm o Miguel completo.
                // Por isso o efeito substitui visualmente o jogador
                // durante alguns milissegundos, em vez de criar um
                // segundo Miguel abaixo da linha do chão.
                this.poeira = this.add.sprite(
                    0,
                    0,
                    'miguel_dust_1'
                );

                this.poeira
                    .setVisible(false)
                    .setDepth(11)
                    .setScale(0.95);

                // Visual separado para a cambalhota.
                // O corpo físico permanece no player original.
                this.doubleJumpVisual = this.add.image(
                    0,
                    0,
                    'miguel_double_jump'
                );

                // Centro aproximado do corpo recolhido:
                // bbox do frame: 81,126 até 174,200.
                this.doubleJumpVisual.setOrigin(
                    127.5 / 256,
                    163 / 256
                );

                // A pose é comprimida verticalmente para parecer
                // mais agachada e recolhida durante o giro.
                this.doubleJumpVisual.setScale(0.95);

                this.doubleJumpVisual
                    .setVisible(false)
                    .setDepth(12);

                this.tweenGiroDuplo = null;

                /*
                 * Frame exclusivo de agachamento.
                 * O canvas e a linha dos pés coincidem
                 * com o frame parado.
                 */
                this.crouchVisual = this.add.image(
                    0,
                    0,
                    'miguel_crouch'
                );

                this.crouchVisual
                    .setScale(1.18)
                    .setAngle(0)
                    .setVisible(false)
                    .setDepth(12);

                // CRISTAIS TECNOLÓGICOS COLETÁVEIS
                this.cristais = this.physics.add.group({
                    key: 'cristalTecnologico',
                    repeat: 4,
                    setXY: { x: 180, y: 25, stepX: 130 }
                });

                this.cristais.children.iterate(function (child) {
                    child.setBounceY(Phaser.Math.FloatBetween(0.4, 0.6));
                    child.setAngularVelocity(90);
                    child.setDepth(5);
                });

                this.physics.add.collider(this.cristais, this.plataformas);
                this.physics.add.overlap(this.player, this.cristais, this.coletarCristal, null, this);

                // ANIMAÇÕES DO MIGUEL
                // Agora utilizam texturas individuais.
                if (!this.anims.exists('walk')) {
                    this.anims.create({
