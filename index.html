<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>As Aventuras do Miguel</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #0d1117; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        class MenuPrincipal extends Phaser.Scene {
            constructor() { super('MenuPrincipal'); }
            preload() {
                // Dimensões corrigidas pelo Codex para não cortar
                this.load.spritesheet('miguel', 'miguel_sprites.png', { frameWidth: 144, frameHeight: 96, margin: 1 });
                this.load.spritesheet('robo', 'robo_sprites.png', { frameWidth: 215, frameHeight: 129 });
            }
            create() {
                this.add.text(400, 200, 'AS AVENTURAS DO MIGUEL', { fontSize: '40px', fill: '#FFCC00' }).setOrigin(0.5);
                let btn = this.add.text(400, 350, '[ INICIAR ]', { fontSize: '30px', fill: '#FFF' }).setOrigin(0.5).setInteractive();
                btn.on('pointerdown', () => this.scene.start('Fase1'));
            }
        }

        class Fase1 extends Phaser.Scene {
            constructor() { super('Fase1'); }
            create() {
                this.cameras.main.setBackgroundColor('#87CEEB');
                
                // Plataformas
                this.plataformas = this.physics.add.staticGroup();
                this.plataformas.create(400, 550, null).setSize(800, 50).setVisible(false); // Chão
                
                // Robô Vilão
                this.robo = this.physics.add.sprite(600, 450, 'robo').setScale(0.5);
                this.robo.setCollideWorldBounds(true);
                this.physics.add.collider(this.robo, this.plataformas);

                // Miguel
                this.player = this.physics.add.sprite(100, 400, 'miguel').setScale(0.5);
                this.player.setCollideWorldBounds(true);
                this.physics.add.collider(this.player, this.plataformas);

                // Controles Mobile
                this.input.addPointer(2); // Suporte multi-touch
                this.cursors = this.input.keyboard.createCursorKeys();
            }

            update() {
                // Lógica de Movimento Suave e Pulo Duplo seria inserida aqui
                if (this.cursors.left.isDown) this.player.setVelocityX(-200);
                else if (this.cursors.right.isDown) this.player.setVelocityX(200);
                else this.player.setVelocityX(0);

                if (this.cursors.up.isDown && this.player.body.touching.down) {
                    this.player.setVelocityY(-500);
                }
            }
        }

        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: 800, height: 600,
            physics: { default: 'arcade', arcade: { gravity: { y: 750 } } },
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            scene: [MenuPrincipal, Fase1]
        };
        const game = new Phaser.Game(config);
    </script>
</body>
</html>
