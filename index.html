                            tipoFase:
                                'TUTORIAL',
                            totalEtapas: 7
                        }
                    )
                );

                this.hudJogo.iniciar();

                this.sistemaVida = (
                    new window.MiguelHealthManager(
                        this,
                        this.player,
                        {
                            vidaMaxima: 100,
                            vidas: 3,

                            hud:
                                this.hudJogo,

                            duracaoInvulnerabilidade:
                                1100,

                            respawnX: 50,
                            respawnY: 320,

                            onDamage: (evento) => {
                                if (this.tutorial) {
                                    this.tutorial.registrarAcao(
                                        'dano-robo',
                                        evento
                                    );

                                    this.tutorial
                                        .mostrarDicaTemporaria(
                                            'Você perdeu vida! '
                                            + 'Use o golpe para '
                                            + 'derrotar este robô.'
                                        );
                                }
                            },

                            onLifeLost: () => {
                                if (this.tutorial) {
                                    this.tutorial
                                        .mostrarDicaTemporaria(
                                            'Você perdeu um coração.'
                                        );
                                }
                            },

                            onRespawn: () => {
                                if (this.tutorial) {
                                    this.tutorial
                                        .mostrarDicaTemporaria(
                                            'Tente novamente!'
                                        );
                                }
                            },

                            onGameOver: () => {
                                if (this.tutorial) {
                                    this.tutorial
                                        .mostrarDicaTemporaria(
                                            'Vamos recomeçar '
                                            + 'o treinamento.'
                                        );
                                }

                                this.time.delayedCall(
                                    1000,
                                    () => {
                                        this.registry.set(
                                            'pontuacao',
                                            0
                                        );

                                        this.scene.restart();
                                    }
                                );
                            }
                        }
                    )
                );

                this.sistemaVida.iniciar();

                this.tutorial = (
                    new window.MiguelTutorialManager(
                        this,
                        {
                            hud:
                                this.hudJogo,

                            totalCristais:
                                this.cristais
                                    .countActive(true),

                            onComplete: () => {
                                if (
                                    this
                                        .transicaoTutorialEmAndamento
                                ) {
                                    return;
                                }

                                this
                                    .transicaoTutorialEmAndamento =
                                    true;

                                /*
                                 * Falhas de limpeza não podem
                                 * impedir a tela de resultado.
                                 */
                                try {
                                    this.sairAgachamento(
                                        true
                                    );
                                } catch (erro) {
                                    console.error(
                                        '[TUTORIAL]',
                                        'falha ao restaurar '
                                        + 'agachamento',
                                        erro
                                    );
                                }

                                try {
                                    if (
                                        this.controles
                                        && typeof this
                                            .controles
                                            .resetarEstado
                                            === 'function'
                                    ) {
                                        this.controles
                                            .resetarEstado();
                                    }
                                } catch (erro) {
                                    console.error(
                                        '[TUTORIAL]',
                                        'falha ao limpar '
                                        + 'controles',
                                        erro
                                    );
                                }

                                try {
                                    this.registry.set(
                                        'tutorialConcluido',
                                        true
                                    );
                                } catch (erro) {
                                    console.error(
                                        '[TUTORIAL]',
                                        'falha ao salvar '
                                        + 'conclusão',
                                        erro
                                    );
                                }

                                let iniciouResultado = false;

                                try {
                                    this.scene.start(
                                        'ResultadoTutorial'
                                    );

                                    iniciouResultado = true;
                                } catch (erro) {
                                    console.error(
                                        '[TUTORIAL]',
                                        'ScenePlugin não abriu '
                                        + 'o resultado',
                                        erro
                                    );
                                }

                                if (
                                    !iniciouResultado
                                    && this.game
                                    && this.game.scene
                                ) {
                                    try {
                                        this.game.scene.start(
                                            'ResultadoTutorial'
                                        );

                                        iniciouResultado = true;
                                    } catch (erro) {
                                        console.error(
                                            '[TUTORIAL]',
                                            'SceneManager não '
                                            + 'abriu o resultado',
                                            erro
                                        );
                                    }
                                }

                                if (!iniciouResultado) {
                                    this
                                        .transicaoTutorialEmAndamento =
                                        false;

                                    console.error(
                                        '[TUTORIAL]',
                                        'transição final falhou'
                                    );
                                }
                            }
                        }
                    )
                );

                this.tutorial.iniciar();
            }

            sincronizarGiroDuplo() {
                if (
                    !this.player.giroDuploAtivo
                    || !this.doubleJumpVisual.visible
                ) {
                    return;
                }

                const escalaBase = 0.95;

                const deslocamentoX = (
                    (127.5 - 128)
                    * escalaBase
                );

                const deslocamentoY = (
                    (163 - 128)
                    * escalaBase
                );

                this.doubleJumpVisual.setPosition(
                    this.player.x + deslocamentoX,
                    this.player.y + deslocamentoY
                );

                this.doubleJumpVisual.setFlipX(
                    this.player.flipX
                );
            }

            cancelarGiroDuplo() {
                if (this.tweenGiroDuplo) {
                    this.tweenGiroDuplo.stop();
                    this.tweenGiroDuplo = null;
                }

                this.player.giroDuploAtivo = false;

                this.doubleJumpVisual
                    .setVisible(false)
                    .setAngle(0)
                    .setScale(0.95);

                if (!this.player.estaEmPoeira) {
                    this.player.setVisible(true);
                }

                this.player.setAngle(0);
            }

            iniciarGiroDuplo() {
                this.cancelarGiroDuplo();

                this.player.giroDuploAtivo = true;
                this.player.setVisible(false);

                this.doubleJumpVisual
                    .setVisible(true)
                    .setAngle(0)
                    .setAlpha(1)
                    .setScale(0.95)
                    .setFlipX(this.player.flipX);

                this.sincronizarGiroDuplo();

                const direcao = (
                    this.player.flipX
                    ? -1
                    : 1
                );

                this.tweenGiroDuplo = (
                    this.tweens.add({
                        targets:
                            this.doubleJumpVisual,

                        angle:
                            direcao * 360,

                        duration: 440,

                        ease:
                            'Cubic.easeInOut',

                        onUpdate: () => {
                            this.sincronizarGiroDuplo();
                        },

                        onComplete: () => {
                            this.player
                                .giroDuploAtivo = false;

                            this.tweenGiroDuplo = null;

                            this.doubleJumpVisual
                                .setVisible(false)
                                .setAngle(0)
                                .setScale(0.95);

                            if (
                                !this.player
                                    .estaEmPoeira
                            ) {
                                this.player
                                    .setVisible(true);
                            }

                            this.player.setAngle(0);
                        }
                    })
                );
            }

            cancelarPoeira() {
                if (!this.player.estaEmPoeira) {
                    return;
                }

                this.poeira.anims.stop();

                this.poeira.off(
                    'animationcomplete-dust_effect'
                );

                this.poeira.setVisible(false);
                this.player.estaEmPoeira = false;

                if (
                    !this.player.giroDuploAtivo
                ) {
                    this.player.setVisible(true);
                }
            }

            sincronizarAgachamento() {
                if (!this.player.estaAgachado) {
                    return;
                }

                /*
                 * A linha dos pés foi capturada antes da
                 * troca do corpo físico. Portanto, não
                 * depende de body.bottom nem do offset
                 * utilizado durante o agachamento.
                 */
                const escalaAgachamento = 1.18;

                const deslocamentoPesNoFrame = (
                    223
                    - 128
                );

                const linhaDosPes = (
                    Number.isFinite(
                        this.player
                            .linhaVisualPesAgachamento
                    )
                    ? this.player
                        .linhaVisualPesAgachamento
                    : (
                        this.player.y
                        + (
                            deslocamentoPesNoFrame
                            * 0.95
                        )
                    )
                );

                const centroVisualY = (
                    linhaDosPes
                    - (
                        deslocamentoPesNoFrame
                        * escalaAgachamento
                    )
                );

                this.player.setVisible(false);

                this.crouchVisual
                    .setVisible(true)
                    .setPosition(
                        this.player.x,
                        centroVisualY
                    )
                    .setAngle(0)
                    .setScale(
                        escalaAgachamento
                    )
                    .setFlipX(
                        this.player.flipX
                    );
            }

            entrarAgachamento() {
                if (
                    this.player.estaAgachado
                    || this.player.estaAtacando
                    || this.player.estaMachucado
                    || this.player.giroDuploAtivo
                ) {
                    return;
                }

                this.cancelarPoeira();
                this.cancelarGiroDuplo();

                const corpo = this.player.body;

                if (
                    typeof corpo.updateFromGameObject
                        === 'function'
                ) {
                    corpo.updateFromGameObject();
                }

                const baseAntes = corpo.bottom;

                /*
                 * Guarda a linha visual das botas enquanto
                 * Miguel ainda está usando o sprite em pé.
                 *
                 * O frame idle termina no pixel 223,
                 * com origem central no pixel 128.
                 */
                this.player.linhaVisualPesAgachamento = (
                    this.player.y
                    + (
                        (223 - 128)
                        * 0.95
                    )
                );

                this.player.estaAgachado = true;

                /*
                 * Enquanto agachado, o corpo não deve
                 * receber gravidade nem velocidade
                 * vertical. Isso impede a alternância
                 * entre agachar e levantar.
                 */
                this.player.setVelocity(
                    0,
                    0
                );

                corpo.allowGravity = false;

                this.player.anims.stop();
                this.player.setVisible(false);

                corpo.setSize(
                    this.player.corpoAgachado
                        .largura,

                    this.player.corpoAgachado
                        .altura
                );

                corpo.setOffset(
                    this.player.corpoAgachado
                        .offsetX,

                    this.player.corpoAgachado
                        .offsetY
                );

                if (
                    typeof corpo.updateFromGameObject
                        === 'function'
                ) {
                    corpo.updateFromGameObject();
                }

                /*
                 * Alterar altura e offset muda a posição
                 * inferior do corpo no Phaser. Corrigimos
                 * o Y do sprite pela diferença real,
                 * preservando exatamente a linha dos pés.
                 */
                const ajusteBase = (
                    baseAntes - corpo.bottom
                );

                if (
                    Number.isFinite(ajusteBase)
                    && Math.abs(ajusteBase) > 0.01
                ) {
                    this.player.y += ajusteBase;

                    if (
                        typeof corpo
                            .updateFromGameObject
                            === 'function'
                    ) {
                        corpo.updateFromGameObject();
                    }
                }

                this.crouchVisual
                    .setVisible(true)
                    .setAngle(0)
                    .setScale(1.18);

                this.sincronizarAgachamento();

                if (this.tutorial) {
                    this.tutorial.registrarAcao(
                        'agachamento'
                    );
                }
            }

            sairAgachamento(
                forcar = false
            ) {
                const estavaAgachado = Boolean(
                    this.player.estaAgachado
                );

                if (
                    !estavaAgachado
                    && !forcar
                ) {
                    return;
                }

                const corpo = this.player.body;

                if (
                    corpo
                    && typeof corpo
                        .updateFromGameObject
                        === 'function'
                ) {
                    corpo.updateFromGameObject();
                }

                const baseAntes = (
                    corpo
                    ? corpo.bottom
                    : null
                );

                this.player.estaAgachado = false;

                this.player.linhaVisualPesAgachamento = null;

                if (this.crouchVisual) {
                    this.crouchVisual
                        .setVisible(false)
                        .setAngle(0);
                }

                if (corpo) {
                    /*
                     * Só zeramos a velocidade vertical
                     * quando o jogador estava realmente
                     * agachado. Chamadas forçadas durante
                     * ataque ou pulo não devem congelar
                     * um personagem que já estava no ar.
                     */
                    if (estavaAgachado) {
                        this.player.setVelocityY(0);
                    }

                    corpo.setSize(
                        this.player.corpoPadrao
                            .largura,

                        this.player.corpoPadrao
                            .altura
                    );

                    corpo.setOffset(
                        this.player.corpoPadrao
                            .offsetX,

                        this.player.corpoPadrao
                            .offsetY
                    );

                    if (
                        typeof corpo
                            .updateFromGameObject
                            === 'function'
                    ) {
                        corpo.updateFromGameObject();
                    }

                    const ajusteBase = (
                        Number.isFinite(baseAntes)
                        ? baseAntes - corpo.bottom
                        : 0
                    );

                    if (
                        Number.isFinite(ajusteBase)
                        && Math.abs(ajusteBase) > 0.01
                    ) {
                        this.player.y += ajusteBase;

                        if (
                            typeof corpo
                                .updateFromGameObject
                                === 'function'
                        ) {
                            corpo.updateFromGameObject();
                        }
                    }

                    corpo.allowGravity = true;
                }

                if (
                    !this.player.estaMachucado
                    && !this.player.estaAtacando
                    && !this.player.estaEmPoeira
                    && !this.player.giroDuploAtivo
                ) {
                    this.player.setVisible(true);
                }
            }

            atualizarAgachamento(
                noChao,
                podeControlar,
                descer
            ) {
                const estadoPermiteAgachar = Boolean(
                    podeControlar
                    && !this.player.estaAtacando
                    && !this.player.estaMachucado
                );

                /*
                 * Depois de entrar, o estado não depende
                 * mais de blocked.down ou velocity.y.
                 * Esses valores podem oscilar durante a
                 * troca do tamanho do corpo.
                 */
                if (this.player.estaAgachado) {
                    if (
                        estadoPermiteAgachar
                        && descer
                    ) {
                        this.player.setVelocity(
                            0,
                            0
                        );

                        this.player.body.allowGravity =
                            false;

                        this.sincronizarAgachamento();
                        return;
                    }

                    this.sairAgachamento();
                    return;
                }

                /*
                 * O chão é exigido somente para iniciar
                 * o agachamento, nunca para mantê-lo.
                 */
                if (
                    estadoPermiteAgachar
                    && noChao
                    && descer
                ) {
                    this.entrarAgachamento();
                    this.sincronizarAgachamento();
                    return;
                }

                this.sairAgachamento();
            }

            trocarEstadoRobo(
                novoEstado,
                time = 0
            ) {
                if (
                    !this.vilao
                    || !this.vilao.active
                    || this.vilao.estadoRobo
                        === novoEstado
                ) {
                    return;
                }

                this.vilao.estadoRobo = novoEstado;
                this.vilao.estadoRoboDesde = time;

                if (novoEstado === 'IDLE') {
                    this.vilao.setVelocityX(0);
                    this.vilao.clearTint();

                    this.vilao.anims.play(
                        'robo_idle',
                        true
                    );

                    return;
                }

                if (novoEstado === 'ALERTA') {
                    this.vilao.setVelocityX(0);
                    this.vilao.clearTint();

                    /*
                     * O frame de carregamento também
                     * funciona como postura de alerta.
                     * Ainda não existe disparo nesta etapa.
                     */
                    this.vilao.anims.stop();
                    this.vilao.setTexture(
                        'robo_attack_charge'
                    );

                    return;
                }

                if (
                    novoEstado === 'PERSEGUICAO'
                ) {
                    this.vilao.clearTint();

                    this.vilao.anims.play(
                        'robo_patrol',
                        true
                    );
                }
            }

            atualizarComportamentoRobo(time) {
                if (
                    !this.vilao
                    || !this.vilao.active
                    || !this.vilao.body
                    || !this.vilao.body.enable
                    || !this.player
                    || !this.player.active
                ) {
                    return;
                }

                const animacaoAtual = (
                    this.vilao.anims
                    && this.vilao.anims.currentAnim
                    ? this.vilao.anims
                        .currentAnim.key
                    : null
                );

                /*
                 * Dano e explosão possuem prioridade.
                 * A máquina não deve interromper essas
                 * animações nem reativar o movimento.
                 */
                if (
                    animacaoAtual === 'robo_damage'
                    || animacaoAtual
                        === 'robo_explosion'
                ) {
                    this.vilao.setVelocityX(0);
                    return;
                }

                const configuracao = (
                    this.vilao
                        .configuracaoComportamento
                );

                const distanciaX = Math.abs(
                    this.player.x - this.vilao.x
                );

                const direcaoAlvo = (
                    this.player.x < this.vilao.x
                    ? -1
                    : 1
                );

                const estado = (
                    this.vilao.estadoRobo
                );

                if (
                    !this.vilao.capacidades.detectar
                ) {
                    this.trocarEstadoRobo(
                        'IDLE',
                        time
                    );

                    return;
                }

                if (estado === 'IDLE') {
                    this.vilao.setVelocityX(0);

                    if (
                        distanciaX
                        <= configuracao
                            .distanciaDeteccao
                    ) {
                        this.vilao.setFlipX(
                            direcaoAlvo < 0
                        );

                        this.trocarEstadoRobo(
                            'ALERTA',
                            time
                        );
                    }

                    return;
                }

                if (estado === 'ALERTA') {
                    this.vilao.setVelocityX(0);
                    this.vilao.setFlipX(
                        direcaoAlvo < 0
                    );

                    if (
                        distanciaX
                        > configuracao
                            .distanciaPerdaAlvo
                    ) {
                        this.trocarEstadoRobo(
                            'IDLE',
                            time
                        );

                        return;
                    }

                    if (
                        this.vilao
                            .capacidades.perseguir
                        && time
                            - this.vilao
                                .estadoRoboDesde
                            >= configuracao
                                .duracaoAlerta
                    ) {
                        this.trocarEstadoRobo(
                            'PERSEGUICAO',
                            time
                        );
                    }

                    return;
                }

                if (
                    estado === 'PERSEGUICAO'
                ) {
                    if (
                        distanciaX
                        > configuracao
                            .distanciaPerdaAlvo
                    ) {
                        this.trocarEstadoRobo(
                            'IDLE',
                            time
                        );

                        return;
                    }

                    this.vilao.setFlipX(
                        direcaoAlvo < 0
                    );

                    if (
                        distanciaX
                        <= configuracao
                            .distanciaParada
                    ) {
                        this.vilao.setVelocityX(0);
                        return;
                    }

                    const tentandoSairPelaEsquerda = (
                        direcaoAlvo < 0
                        && this.vilao.x
                            <= this.vilao
                                .limiteEsquerda
                    );

                    const tentandoSairPelaDireita = (
                        direcaoAlvo > 0
                        && this.vilao.x
                            >= this.vilao
                                .limiteDireita
                    );

                    if (
                        tentandoSairPelaEsquerda
                        || tentandoSairPelaDireita
                    ) {
                        this.vilao.setVelocityX(0);
                        return;
                    }

                    this.vilao.anims.play(
                        'robo_patrol',
                        true
                    );

                    this.vilao.setVelocityX(
                        direcaoAlvo
                        * configuracao
                            .velocidadePerseguicao
                    );

                    return;
                }

                this.trocarEstadoRobo(
                    'IDLE',
                    time
                );
            }

            update(time, delta) {
                if (this.visualCenario) {
                    this.visualCenario.atualizar(
                        time,
                        delta,
                        this.player
                        ? this.player.x
                        : 400
                    );
                }

                if (this.controles) {
                    this.controles.atualizar();

                    if (this.hudJogo) {
                        this.hudJogo
                            .atualizarDispositivo(
                                this.controles
                                    .ultimoDispositivo
                            );

                        this.hudJogo
                            .atualizarVisibilidade(
                                this.player
                            );
                    }
                }

                const noChao = Boolean(
                    this.player.body.blocked.down
                    || this.player.body.touching.down
                );

                if (
                    this.controles
                    && this.controles
                        .consumirReiniciar()
                ) {
                    this.registry.set(
                        'pontuacao',
                        0
                    );

                    this.scene.restart();
                    return;
                }

                if (
                    noChao
                    && !this.player.estavaNoChao
                ) {
                    this.player.pulosDisponiveis = 2;

                    this.cancelarGiroDuplo();
                    this.tocarPoeira();
                } else if (noChao) {
                    this.player.pulosDisponiveis = 2;
                }

                this.atualizarComportamentoRobo(
                    time
                );

                const podeControlar = Boolean(
                    !this.player.estaMachucado
                    && !(
                        this.sistemaVida
                        && this.sistemaVida.morto
                    )
                );

                const eixoX = (
                    this.controles
                    ? this.controles
                        .obterMovimentoX()
                    : 0
                );

                const eixoY = (
                    this.controles
                    ? this.controles
                        .obterMovimentoY()
                    : 0
                );

                const descer = Boolean(
                    this.controles
                    && this.controles
                        .estaAgachando()
                );

                const movimentoLateralAgachamento = (
                    Math.abs(eixoX) >= 0.38
                );

                if (descer) {
                    this.player
                        .agachamentoMantidoAte = (
                            time + 180
                        );
                }

                const descerEstavel = Boolean(
                    descer
                    || (
                        this.player.estaAgachado
                        && !movimentoLateralAgachamento
                        && time <= this.player
                            .agachamentoMantidoAte
                    )
                );

                const quedaRapida = (
                    eixoY > 0.62
                );

                this.atualizarAgachamento(
                    noChao,
                    podeControlar,
                    descerEstavel
                );

                const esquerda = eixoX < -0.16;
                const direita = eixoX > 0.16;

                if (
                    podeControlar
                    && !this.player.estaAgachado
                    && esquerda
                    && !direita
                ) {
                    this.player.setVelocityX(
                        -220 * Math.max(
                            0.38,
                            Math.abs(eixoX)
                        )
                    );

                    this.player.setFlipX(true);

                    if (
                        noChao
                        && !this.player.estaAtacando
                        && !this.player.estaEmPoeira
                    ) {
                        this.player.anims.play(
                            'walk',
                            true
                        );
                    }
                } else if (
                    podeControlar
                    && !this.player.estaAgachado
                    && direita
                    && !esquerda
                ) {
                    this.player.setVelocityX(
                        220 * Math.max(
                            0.38,
                            Math.abs(eixoX)
                        )
                    );

                    this.player.setFlipX(false);

                    if (
                        noChao
                        && !this.player.estaAtacando
                        && !this.player.estaEmPoeira
                    ) {
                        this.player.anims.play(
                            'walk',
                            true
                        );
                    }
                } else if (
                    podeControlar
                    && !this.player.estaAgachado
                ) {
                    this.player.setVelocityX(0);

                    if (
                        noChao
                        && !this.player.estaAtacando
                        && !this.player.estaEmPoeira
                    ) {
                        this.player.anims.play(
                            'idle',
                            true
                        );
                    }
                } else if (
                    podeControlar
                    && this.player.estaAgachado
                ) {
                    this.player.setVelocityX(0);
                }

                if (this.tutorial) {
                    this.tutorial.registrarMovimento(
                        this.player.x
                    );
                }

                if (
                    podeControlar
                    && quedaRapida
                    && !this.player.estaAgachado
                    && !noChao
                    && this.player.body.velocity.y
                        < 360
                ) {
                    this.player.setVelocityY(360);
                }

                const pediuPulo = Boolean(
                    this.controles
                    && this.controles
                        .consumirPulo()
                );

                if (
                    pediuPulo
                    && podeControlar
                ) {
                    this.sairAgachamento(true);
                    this.executarPulo(noChao);
                }

                const pediuAtaque = Boolean(
                    this.controles
                    && this.controles
                        .consumirAtaque()
                );

                if (
                    pediuAtaque
                    && podeControlar
                ) {
                    this.sairAgachamento(true);
                    this.executarAtaque();
                }

                const pediuPoder = Boolean(
                    this.controles
                    && this.controles
                        .consumirPoder()
                );

                if (
                    pediuPoder
                    && podeControlar
                ) {
                    if (this.hudJogo) {
                        this.hudJogo
                            .mostrarMensagem(
                                'PODER BLOQUEADO — '
                                + 'COMPLETE O TREINAMENTO',
                                1550
                            );
                    }

                    GERENCIADOR_CONFIGURACOES
                        .vibrar([
                            10,
                            35,
                            10
                        ]);
                }

                /*
                 * A cambalhota pertence somente à subida.
                 * Assim que a queda começa, o giro termina
                 * e Miguel retorna para uma pose vertical.
                 */
                const estaDescendo = Boolean(
                    !noChao
                    && this.player.body.velocity.y > 40
                );

                if (
                    estaDescendo
                    && this.player.giroDuploAtivo
                ) {
                    this.cancelarGiroDuplo();
                }

                if (
                    !noChao
                    && !this.player.estaAtacando
                    && !this.player.giroDuploAtivo
                    && !this.player.estaEmPoeira
                    && !this.player.estaMachucado
                    && !this.player.estaAgachado
                ) {
                    /*
                     * Durante a descida usamos o frame
                     * vertical de pulo, mesmo depois de
                     * um pulo duplo.
                     */
                    const animacaoPulo = (
                        estaDescendo
                        ? 'jump'
                        : (
                            this.player
                                .pulosDisponiveis === 0
                            ? 'jump_double'
                            : 'jump'
                        )
                    );

                    this.player.anims.play(
                        animacaoPulo,
                        true
                    );
                }

                if (
                    this.player.giroDuploAtivo
                ) {
                    this.sincronizarGiroDuplo();
                }

                if (this.player.estaEmPoeira) {
                    this.poeira.setPosition(
                        this.player.x,
                        this.player.y
                    );

                    this.poeira.setFlipX(
                        this.player.flipX
                    );
                }

                if (this.player.estaAgachado) {
                    this.sincronizarAgachamento();
                }

                this.player.estavaNoChao = noChao;
            }

            executarPulo(noChao) {
                this.sairAgachamento(true);
                this.cancelarPoeira();

                if (noChao) {
                    this.player.pulosDisponiveis = 1;

                    this.player.setVelocityY(-520);

                    if (this.tutorial) {
                        this.tutorial.registrarAcao(
                            'pulo'
                        );
                    }

                    if (!this.player.estaAtacando) {
                        this.player.anims.play(
                            'jump',
                            true
                        );
                    }

                    return;
                }

                if (
                    this.player.pulosDisponiveis > 0
                ) {
                    this.player.pulosDisponiveis = 0;
                    this.player.setVelocityY(-500);

                    if (this.tutorial) {
                        this.tutorial.registrarAcao(
                            'pulo-duplo'
                        );
                    }

                    this.iniciarGiroDuplo();
                }
            }

            executarAtaque() {
                if (
                    this.player.estaAtacando
                    || this.player.estaMachucado
                    || (
                        this.sistemaVida
                        && this.sistemaVida.morto
                    )
                ) {
                    return;
                }

                this.sairAgachamento(true);
                this.cancelarGiroDuplo();
                this.cancelarPoeira();

                this.player.estaAtacando = true;
                this.player.anims.play('attack', true);
                this.player.once('animationcomplete-attack', () => {
                    this.player.estaAtacando = false;
                });

                const alcance = 70;
                const direcao = this.player.flipX ? -1 : 1;
                const areaAtaque = new Phaser.Geom.Rectangle(
                    this.player.x + (direcao > 0 ? 10 : -alcance - 10),
                    this.player.y - 45,
                    alcance,
                    90
                );

                if (
                    this.vilao
                    && this.vilao.active
                    && Phaser.Geom.Rectangle.Overlaps(
                        areaAtaque,
                        this.vilao.getBounds()
                    )
                ) {
                    const podeDestruir = Boolean(
                        !this.tutorial
                        || this.tutorial
                            .podeDerrotarRobo()
                    );

                    if (podeDestruir) {
                        this.destruirVilao(
                            this.vilao,
                            'ataque'
                        );
                    } else {
                        this.vilao.anims.play(
                            'robo_damage',
                            true
                        );

                        this.vilao.off(
                            'animationcomplete-robo_damage'
                        );

                        this.vilao.once(
                            'animationcomplete-robo_damage',
                            () => {
                                if (
                                    this.vilao
                                    && this.vilao.active
                                ) {
                                    this.vilao.anims.play(
                                        'robo_patrol',
                                        true
                                    );
                                }
                            }
                        );

                        this.tutorial
                            .mostrarDicaTemporaria(
                                'Primeiro descubra '
                                + 'o perigo de encostar '
                                + 'no robô.'
                            );
                    }
                }
            }

            tocarPoeira() {
                if (
                    this.player.estaAtacando
                    || this.player.estaMachucado
                    || this.player.estaAgachado
                ) {
                    return;
                }

                this.cancelarPoeira();

                this.player.estaEmPoeira = true;

                // Mesma posição, escala e orientação do player.
                // Não utiliza body.bottom porque os frames de
                // poeira possuem canvas completo de 256x256.
                this.poeira.setPosition(
                    this.player.x,
                    this.player.y
                );

                this.poeira.setScale(
                    this.player.scaleX,
                    this.player.scaleY
                );

                this.poeira.setFlipX(
                    this.player.flipX
                );

                this.player.setVisible(false);
                this.poeira.setVisible(true);

                this.poeira.anims.play(
                    'dust_effect',
                    true
                );

                this.poeira.off(
                    'animationcomplete-dust_effect'
                );

                this.poeira.once(
                    'animationcomplete-dust_effect',
                    () => {
                        this.poeira.setVisible(false);
                        this.player.estaEmPoeira = false;

                        if (
                            !this.player
                                .giroDuploAtivo
                        ) {
                            this.player
                                .setVisible(true);
                        }
                    }
                );
            }

            destruirVilao(
                vilao,
                causa = 'desconhecida'
            ) {
                if (
                    causa === 'ataque'
                    && this.tutorial
                ) {
                    this.tutorial.registrarAcao(
                        'ataque-robo'
                    );
                }

                vilao.setVelocity(0, 0);
                vilao.body.enable = false;
                vilao.anims.play('robo_explosion', true);
                vilao.once('animationcomplete-robo_explosion', () => vilao.disableBody(true, true));
            }

            coletarCristal(
                player,
                cristal
            ) {
                cristal.disableBody(true, true);

                this.pontos += 10;

                this.registry.set(
                    'pontuacao',
                    this.pontos
                );

                if (this.hudJogo) {
                    this.hudJogo
                        .atualizarPontuacao(
                            this.pontos
                        );
                }

                if (this.tutorial) {
                    this.tutorial.registrarAcao(
                        'cristal',
                        {
                            restantes:
                                this.cristais
                                    .countActive(true)
                        }
                    );
                } else if (
                    this.cristais
                        .countActive(true) === 0
                ) {
                    // Fallback defensivo para uma cena
                    // criada sem o gerenciador.
                    this.scene.start(
                        'ResultadoTutorial'
                    );
                }
            }

            acertarVilao(
                player,
                vilao
            ) {
                if (
                    !vilao
                    || !vilao.active
                    || !this.sistemaVida
                ) {
                    return;
                }

                const pisouNoVilao = Boolean(
                    player.body.velocity.y > 0
                    && player.body.bottom
                        <= vilao.body.top + 24
                );

                const dano = (
                    pisouNoVilao
                    ? vilao.danoPisao
                    : vilao.danoContato
                );

                const direcaoRecuo = (
                    player.x < vilao.x
                    ? -1
                    : 1
                );

                const danoAplicado = (
                    this.sistemaVida.receberDano(
                        dano,
                        {
                            origem:
                                vilao.tipoInimigo,

                            forma:
                                pisouNoVilao
                                ? 'pisao'
                                : 'contato',

                            direcao:
                                direcaoRecuo,

                            impulsoX:
                                pisouNoVilao
                                ? 220
                                : 280,

                            impulsoY:
                                pisouNoVilao
                                ? -340
                                : -220
                        }
                    )
                );

                if (
                    danoAplicado
                    && this.tutorial
                ) {
                    this.tutorial.registrarAcao(
                        'dano-robo',
                        {
                            forma:
                                pisouNoVilao
                                ? 'pisao'
                                : 'contato',

                            dano
                        }
                    );
                }
            }
        }

        // ==========================================
        // CENA 3: RESULTADO DO TUTORIAL
        // ==========================================
        class ResultadoTutorial
            extends Phaser.Scene
        {
            constructor() {
                super('ResultadoTutorial');
            }

            create() {
                GERENCIADOR_DISPOSITIVO
                    .ativarFase(
                        CONFIGURACAO_FASES
                            .fases
                            .ResultadoTutorial
                    );

                let nome = this.registry.get('nomeJogador');
                let pontosFinal = this.registry.get('pontuacao');

                this.add.image(
                    175,
                    275,
                    'miguel_victory'
                )
                    .setScale(1.05)
                    .setDepth(5);

                this.add.text(
                    505,
                    175,
                    'TREINAMENTO CONCLUÍDO!',
                    {
                        fontSize: '38px',
                        fill: '#00FF66',
                        fontStyle: 'bold'
                    }
                ).setOrigin(0.5);

                this.add.text(
                    505,
                    275,
                    `HERÓI: ${nome}`,
                    {
                        fontSize: '26px',
                        fill: '#FFF'
                    }
                ).setOrigin(0.5);

                this.add.text(
                    505,
                    335,
                    `PONTOS: ${pontosFinal}`,
                    {
                        fontSize: '32px',
                        fill: '#FFCC00',
                        fontStyle: 'bold'
                    }
                ).setOrigin(0.5);

                const botaoAventura = (
                    this.add.text(
                        505,
                        425,
                        '[ COMEÇAR A AVENTURA ]',
                        {
                            fontSize: '22px',
                            fill: '#0d1117',
                            backgroundColor:
                                '#28ff9b',
                            padding: {
                                x: 18,
                                y: 12
                            },
                            fontStyle: 'bold'
                        }
                    )
                ).setOrigin(0.5);

                botaoAventura.setInteractive({
                    useHandCursor: true
                });

                botaoAventura.on(
                    'pointerdown',
                    async () => {
                        await GERENCIADOR_DISPOSITIVO
                            .entrarModoJogo(
                                CONFIGURACAO_FASES
                                    .fases
                                    .Fase1
                            );

                        this.scene.start(
                            'Fase1'
                        );
                    }
                );

                const botaoMenu = (
                    this.add.text(
                        505,
                        500,
                        '[ VOLTAR AO MENU ]',
                        {
                            fontSize: '20px',
                            fill: '#FFCC00',
                            fontStyle: 'bold'
                        }
                    )
                ).setOrigin(0.5);

                botaoMenu.setInteractive({
                    useHandCursor: true
                });

                botaoMenu.on(
                    'pointerdown',
                    () => {
                        GERENCIADOR_DISPOSITIVO
                            .desativarFase();

                        this.scene.start(
                            'MenuPrincipal'
                        );
                    }
                );
            }
        }

        // ==========================================
        // CENA 4: PRIMEIRA AVENTURA
        // ==========================================
        class Fase1 extends Phaser.Scene {
            constructor() {
                super('Fase1');
            }

            create() {
                GERENCIADOR_DISPOSITIVO
                    .ativarFase(
                        CONFIGURACAO_FASES
                            .fases
                            .Fase1
                    );

                this.cameras.main.setBackgroundColor(
                    '#081526'
                );

                this.add.rectangle(
                    400,
                    470,
                    800,
                    260,
                    0x123e58,
                    1
                );

                this.add.circle(
                    665,
                    105,
                    54,
                    0xffe89a,
                    0.92
                );

                for (
                    let indice = 0;
                    indice < 30;
                    indice += 1
                ) {
                    this.add.circle(
                        Phaser.Math.Between(
                            20,
                            780
                        ),

                        Phaser.Math.Between(
                            20,
                            280
                        ),

                        Phaser.Math.Between(
                            1,
                            3
                        ),

                        0xffffff,

                        Phaser.Math.FloatBetween(
                            0.35,
                            0.9
                        )
                    );
                }

                this.add.text(
                    400,
                    80,
                    'PRIMEIRA AVENTURA',
                    {
                        fontFamily:
                            'Courier New',

                        fontSize:
                            '38px',

                        color:
                            '#ffcc00',

                        fontStyle:
                            'bold'
                    }
                ).setOrigin(0.5);

                this.add.text(
                    400,
                    140,
                    'FASE 1',
                    {
                        fontFamily:
                            'Courier New',

                        fontSize:
                            '26px',

                        color:
                            '#8fe9ff',

                        fontStyle:
                            'bold'
                    }
                ).setOrigin(0.5);

                this.add.image(
                    400,
                    315,
                    'miguel_idle'
                ).setScale(1.05);

                this.add.text(
                    400,
                    430,
                    'A estrutura da primeira fase '
                    + 'está pronta para receber '
                    + 'o cenário, os inimigos '
                    + 'e o chefe.',
                    {
                        fontFamily:
                            'Courier New',

                        fontSize:
                            '17px',

                        color:
                            '#ffffff',

                        align:
                            'center',

                        wordWrap: {
                            width: 620
                        }
                    }
                ).setOrigin(0.5);

                const botaoMenu = (
                    this.add.text(
                        400,
                        535,
                        '[ VOLTAR AO MENU ]',
                        {
                            fontFamily:
                                'Courier New',

                            fontSize:
                                '20px',

                            color:
                                '#ffcc00',

                            fontStyle:
                                'bold'
                        }
                    )
                ).setOrigin(0.5);

                botaoMenu.setInteractive({
                    useHandCursor: true
                });

                botaoMenu.on(
                    'pointerdown',
                    () => {
                        GERENCIADOR_DISPOSITIVO
                            .desativarFase();

                        this.scene.start(
                            'MenuPrincipal'
                        );
                    }
                );
            }
        }

        // ==========================================
        // CONFIGURAÇÕES GERAIS (ESCAlA MOBILE-FIRST)
        // ==========================================
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: 800,
            height: 600,
            backgroundColor: '#0d1117', // Fundo escuro de altíssimo contraste
            scale: {
                mode: Phaser.Scale.FIT, // Faz o jogo expandir e caber perfeitamente em telas de qualquer celular
                autoCenter: Phaser.Scale.NO_CENTER
            },
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 750 }, debug: false }
            },
            scene: [
                MenuPrincipal,
                Configuracoes,
                Tutorial,
                ResultadoTutorial,
                Fase1
            ]
        };

        const game = new Phaser.Game(config);

        const obterViewportJogo = () => {
            const viewport = window.visualViewport;

            const width = Math.max(
                1,
                Math.round(
                    viewport
                    ? viewport.width
                    : window.innerWidth
                )
            );

            const height = Math.max(
                1,
                Math.round(
                    viewport
                    ? viewport.height
                    : window.innerHeight
                )
            );

            return {
                width,
                height
            };
        };

        const recalcularLayoutJogo = () => {
            const viewport = obterViewportJogo();

            document.documentElement.style.setProperty(
                '--app-width',
                `${viewport.width}px`
            );

            document.documentElement.style.setProperty(
                '--app-height',
                `${viewport.height}px`
            );

            const container = document.getElementById(
                'game-container'
            );

            if (container) {
                container.style.width = (
                    `${viewport.width}px`
                );

                container.style.height = (
                    `${viewport.height}px`
                );

                container.style.left = '0px';
                container.style.top = '0px';
            }

            if (
                game
                && game.scale
            ) {
                game.scale.refresh();
            }

            if (game && game.canvas) {
                game.canvas.style.margin = '0';
                game.canvas.style.left = 'auto';
                game.canvas.style.top = 'auto';
            }

            window.__MIGUEL_LAYOUT_STATE__ = {
                viewport,

                canvas: (
                    game && game.canvas
                    ? {
                        width:
                            game.canvas
                                .getBoundingClientRect()
                                .width,

                        height:
                            game.canvas
                                .getBoundingClientRect()
                                .height,

                        left:
                            game.canvas
                                .getBoundingClientRect()
                                .left,

                        top:
                            game.canvas
                                .getBoundingClientRect()
                                .top
                    }
                    : null
                ),

                atualizadoEm: Date.now()
            };
        };

        let revisaoLayout = 0;
        let temporizadoresLayout = [];

        const limparTemporizadoresLayout = () => {
            temporizadoresLayout.forEach(
                (temporizador) => {
                    window.clearTimeout(
                        temporizador
                    );
                }
            );

            temporizadoresLayout = [];
        };

        const agendarRecalculoJogo = () => {
            revisaoLayout += 1;

            const revisaoAtual = (
                revisaoLayout
            );

            limparTemporizadoresLayout();

            const container = (
                document.getElementById(
                    'game-container'
                )
            );

            if (container) {
                container.classList.add(
                    'layout-settling'
                );
            }

            [
                0,
                70,
                160,
                300,
                520,
                720
            ].forEach((atraso) => {
                const temporizador = (
                    window.setTimeout(
                        () => {
                            if (
                                revisaoAtual
                                !== revisaoLayout
                            ) {
                                return;
                            }

                            recalcularLayoutJogo();
                        },
                        atraso
                    )
                );

                temporizadoresLayout.push(
                    temporizador
                );
            });

            const temporizadorFinal = (
                window.setTimeout(
                    () => {
                        if (
                            revisaoAtual
                            !== revisaoLayout
                        ) {
                            return;
                        }

                        recalcularLayoutJogo();

                        if (container) {
                            container.classList.remove(
                                'layout-settling'
                            );
                        }

                        window.dispatchEvent(
                            new CustomEvent(
                                'miguel:layout-stable',
                                {
                                    detail: {
                                        revisao:
                                            revisaoAtual
                                    }
                                }
                            )
                        );
                    },
                    900
                )
            );

            temporizadoresLayout.push(
                temporizadorFinal
            );
        };

        window.addEventListener(
            'resize',
            agendarRecalculoJogo
        );

        window.addEventListener(
            'orientationchange',
            agendarRecalculoJogo
        );

        document.addEventListener(
            'fullscreenchange',
            agendarRecalculoJogo
        );

        document.addEventListener(
            'webkitfullscreenchange',
            agendarRecalculoJogo
        );

        if (window.visualViewport) {
            window.visualViewport.addEventListener(
                'resize',
                agendarRecalculoJogo
            );

            window.visualViewport.addEventListener(
                'scroll',
                agendarRecalculoJogo
            );
        }

        if (
            screen.orientation
            && typeof screen.orientation
                .addEventListener === 'function'
        ) {
            screen.orientation.addEventListener(
                'change',
                agendarRecalculoJogo
            );
        }

        window.__MIGUEL_LAYOUT__ = {
            refresh: agendarRecalculoJogo,

            recalculate:
                recalcularLayoutJogo,

            snapshot: () => {
                recalcularLayoutJogo();

                return (
                    window.__MIGUEL_LAYOUT_STATE__
                );
            }
        };


        window.__MIGUEL_GAME__ = game;

        window.MIGUEL_ROTATION_MANAGER
            .inicializar({
                game,

                deviceManager:
                    GERENCIADOR_DISPOSITIVO
            });

        agendarRecalculoJogo();

    </script>
