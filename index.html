<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #87CEEB; /* Mudei para um azul céu para destacar o personagem */ }</style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            physics: { default: 'arcade', arcade: { gravity: { y: 400 }, debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);

        function preload() {
            // ATENÇÃO: Altere o 64 pelo valor correto que você calculou (Largura Total / 4)
            this.load.spritesheet('miguel', 'miguel_sprites.png', { frameWidth: 64, frameHeight: 64 });
        }

        function create() {
            this.player = this.physics.add.sprite(400, 300, 'miguel');
            this.player.setCollideWorldBounds(true);

            // Animação de Caminhada (frames 1 e 2)
            this.anims.create({
                key: 'walk',
                frames: this.anims.generateFrameNumbers('miguel', { start: 1, end: 2 }),
                frameRate: 10,
                repeat: -1
            });

            // Animação Parado (frame 0)
            this.anims.create({
                key: 'idle',
                frames: [ { key: 'miguel', frame: 0 } ],
                frameRate: 20
            });

            // Animação Pulando (frame 3)
            this.anims.create({
                key: 'jump',
                frames: [ { key: 'miguel', frame: 3 } ],
                frameRate: 20
            });

            this.cursors = this.input.keyboard.createCursorKeys();
        }

        function update() {
            // Verifica se o jogador está no chão
            let noChao = this.player.body.onFloor();

            // Movimento para os lados
            if (this.cursors.left.isDown) {
                this.player.setVelocityX(-200);
                this.player.flipX = true;
                if (noChao) this.player.anims.play('walk', true);
            }
            else if (this.cursors.right.isDown) {
                this.player.setVelocityX(200);
                this.player.flipX = false;
                if (noChao) this.player.anims.play('walk', true);
            }
            else {
                this.player.setVelocityX(0);
                if (noChao) this.player.anims.play('idle', true);
            }

            // Pulo e animação de pulo
            if (this.cursors.up.isDown && noChao) {
                this.player.setVelocityY(-350);
            }

            // Se não estiver no chão, toca a animação de pulo independente de estar indo pros lados
            if (!noChao) {
                this.player.anims.play('jump', true);
            }
        }
    </script>
</body>
</html>
