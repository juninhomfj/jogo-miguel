            const width = Math.max(
                1,
                Math.round(
                    viewport
                    ? viewport.width
                    : window.innerWidth
                )
            );

            const height = Math.max(
                1,
                Math.round(
                    viewport
                    ? viewport.height
                    : window.innerHeight
                )
            );

            return {
                width,
                height
            };
        };

        const recalcularLayoutJogo = () => {
            const viewport = obterViewportJogo();

            document.documentElement.style.setProperty(
                '--app-width',
                `${viewport.width}px`
            );

            document.documentElement.style.setProperty(
                '--app-height',
                `${viewport.height}px`
            );

            const container = document.getElementById(
                'game-container'
            );

            if (container) {
                container.style.width = (
                    `${viewport.width}px`
                );

                container.style.height = (
                    `${viewport.height}px`
                );

                container.style.left = '0px';
                container.style.top = '0px';
            }

            if (
                game
                && game.scale
            ) {
                game.scale.refresh();
            }

            if (game && game.canvas) {
                game.canvas.style.margin = '0';
                game.canvas.style.left = 'auto';
                game.canvas.style.top = 'auto';
            }

            window.__MIGUEL_LAYOUT_STATE__ = {
                viewport,

                canvas: (
                    game && game.canvas
                    ? {
                        width:
                            game.canvas
                                .getBoundingClientRect()
                                .width,

                        height:
                            game.canvas
                                .getBoundingClientRect()
                                .height,

                        left:
                            game.canvas
                                .getBoundingClientRect()
                                .left,

                        top:
                            game.canvas
                                .getBoundingClientRect()
                                .top
                    }
                    : null
                ),

                atualizadoEm: Date.now()
            };
        };

        let revisaoLayout = 0;
        let temporizadoresLayout = [];

        const limparTemporizadoresLayout = () => {
            temporizadoresLayout.forEach(
                (temporizador) => {
                    window.clearTimeout(
                        temporizador
                    );
                }
            );

            temporizadoresLayout = [];
        };

        const agendarRecalculoJogo = () => {
            revisaoLayout += 1;

            const revisaoAtual = (
                revisaoLayout
            );

            limparTemporizadoresLayout();

            const container = (
                document.getElementById(
                    'game-container'
                )
            );

            if (container) {
                container.classList.add(
                    'layout-settling'
                );
            }

            [
                0,
                70,
                160,
                300,
                520,
                720
            ].forEach((atraso) => {
                const temporizador = (
                    window.setTimeout(
                        () => {
                            if (
                                revisaoAtual
                                !== revisaoLayout
                            ) {
                                return;
                            }

                            recalcularLayoutJogo();
                        },
                        atraso
                    )
                );

                temporizadoresLayout.push(
                    temporizador
                );
            });

            const temporizadorFinal = (
                window.setTimeout(
                    () => {
                        if (
                            revisaoAtual
                            !== revisaoLayout
                        ) {
                            return;
                        }

                        recalcularLayoutJogo();

                        if (container) {
                            container.classList.remove(
                                'layout-settling'
                            );
                        }

                        window.dispatchEvent(
                            new CustomEvent(
                                'miguel:layout-stable',
                                {
                                    detail: {
                                        revisao:
                                            revisaoAtual
                                    }
                                }
                            )
                        );
                    },
                    900
                )
            );

            temporizadoresLayout.push(
                temporizadorFinal
            );
        };

        window.addEventListener(
            'resize',
            agendarRecalculoJogo
        );

        window.addEventListener(
            'orientationchange',
            agendarRecalculoJogo
        );

        document.addEventListener(
            'fullscreenchange',
            agendarRecalculoJogo
        );

        document.addEventListener(
            'webkitfullscreenchange',
            agendarRecalculoJogo
        );

        if (window.visualViewport) {
            window.visualViewport.addEventListener(
                'resize',
                agendarRecalculoJogo
            );

            window.visualViewport.addEventListener(
                'scroll',
                agendarRecalculoJogo
            );
        }

        if (
            screen.orientation
            && typeof screen.orientation
                .addEventListener === 'function'
        ) {
            screen.orientation.addEventListener(
                'change',
                agendarRecalculoJogo
            );
        }

        window.__MIGUEL_LAYOUT__ = {
            refresh: agendarRecalculoJogo,

            recalculate:
                recalcularLayoutJogo,

            snapshot: () => {
                recalcularLayoutJogo();

                return (
                    window.__MIGUEL_LAYOUT_STATE__
                );
            }
        };


        window.__MIGUEL_GAME__ = game;

        window.MIGUEL_ROTATION_MANAGER
            .inicializar({
                game,

                deviceManager:
                    GERENCIADOR_DISPOSITIVO
            });

        agendarRecalculoJogo();

    </script>
</body>
</html>
