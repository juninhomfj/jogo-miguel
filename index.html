<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #e0f7fa; }</style>
</head>
<body>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            backgroundColor: '#87CEEB',
            physics: { default: 'arcade', arcade: { gravity: { y: 600 }, debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);

        function preload() {
            // Novas dimensões do removedor de fundo
            this.load.spritesheet('miguel', 'miguel_sprites.png', { frameWidth: 216, frameHeight: 288 });
        }

        function create() {
            // CRIANDO O CHÃO (PLATAFORMA)
            this.plataformas = this.physics.add.staticGroup();
            // Cria um retângulo verde para servir de chão provisório (x, y, largura, altura, cor)
            let chao = this.add.rectangle(400, 580, 800, 40, 0x228B22);
            this.plataformas.add(chao);

            // CRIANDO O MIGUEL
            this.player = this.physics.add.sprite(400, 300, 'miguel');
            this.player.setScale(0.4); // Ajustado para ficar com um tamanho legal
            this.player.updateBounds(); 
            this.player.setCollideWorldBounds(true);

            // Faz o Miguel pisar no chão
            this.physics.add.collider(this.player, this.plataformas);

            // ANIMAÇÕES
            this.anims.create({
                key: 'walk',
                frames: this.anims.generateFrameNumbers('miguel', { start: 1, end: 2 }),
                frameRate: 10,
                repeat: -1
            });
            this.anims.create({
                key: 'idle',
                frames: [ { key: 'miguel', frame: 0 } ],
                frameRate: 20
            });
            this.anims.create({
                key: 'jump',
                frames: [ { key: 'miguel', frame: 3 } ],
                frameRate: 20
            });

            this.cursors = this.input.keyboard.createCursorKeys();
        }

        function update() {
            let noChao = this.player.body.touching.down; // Verifica se está tocando a plataforma

            if (this.cursors.left.isDown) {
                this.player.setVelocityX(-200);
                this.player.flipX = true;
                if (noChao) this.player.anims.play('walk', true);
            }
            else if (this.cursors.right.isDown) {
                this.player.setVelocityX(200);
                this.player.flipX = false;
                if (noChao) this.player.anims.play('walk', true);
            }
            else {
                this.player.setVelocityX(0);
                if (noChao) this.player.anims.play('idle', true);
            }

            if (this.cursors.up.isDown && noChao) {
                this.player.setVelocityY(-450); // Aumentei a força do pulo
            }

            if (!noChao) {
                this.player.anims.play('jump', true);
            }
        }
    </script>
</body>
</html>
