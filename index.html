<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>As Aventuras do Miguel</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        html,
        body,
        #game-container,
        canvas {
            touch-action: none;
            overscroll-behavior: none;
        }
        body {
            background-color: #0d1117;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Caixa de Input de Nome Estilo Arcade Retro (Mobile Friendly) */
        #name-input-container {
            position: absolute;
            display: none; /* Controlado dinamicamente pelo Phaser */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: rgba(20, 25, 35, 0.95);
            border: 4px solid #FFCC00;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(255, 204, 0, 0.5);
            width: 85%;
            max-width: 340px;
        }
        #name-input-container label {
            font-size: 18px;
            color: #FFCC00;
            margin-bottom: 12px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #player-name-input {
            width: 100%;
            padding: 12px;
            font-size: 26px;
            text-align: center;
            text-transform: uppercase;
            border: 2px solid #FFCC00;
            background: #111;
            color: #FFF;
            font-family: inherit;
            font-weight: bold;
            letter-spacing: 4px;
            outline: none;
            border-radius: 6px;
        }
        #start-button {
            margin-top: 18px;
            width: 100%;
            padding: 14px;
            font-size: 20px;
            background: #FFCC00;
            color: #0d1117;
            border: none;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 0 #CC9900;
        }
        #start-button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #CC9900;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="name-input-container">
            <label for="player-name-input">Iniciais do Herói</label>
            <input type="text" id="player-name-input" maxlength="3" placeholder="___" autocomplete="off">
            <button id="start-button">ENTRAR</button>
        </div>
    </div>

    <script>
        // ==========================================
        // CENA 1: MENU PRINCIPAL
        // ==========================================
        class MenuPrincipal extends Phaser.Scene {
            constructor() {
                super('MenuPrincipal');
            }

            preload() {
                // Alerta automático caso a imagem dê erro ao carregar do GitHub
                this.load.on('loaderror', function (file) {
                    alert("AVISO DEV: Não foi possível carregar a imagem '" + file.src + "'. Verifique se o nome está idêntico com letras minúsculas!");
                });

                // MIGUEL — 14 frames individuais aprovados.
                // Cada textura possui canvas RGBA de 256x256.
                this.load.image(
                    'miguel_idle',
                    'assets/frames/miguel/00_idle.png'
                );
                this.load.image(
                    'miguel_walk_1',
                    'assets/frames/miguel/01_walk_1.png'
                );
                this.load.image(
                    'miguel_walk_2',
                    'assets/frames/miguel/02_walk_2.png'
                );
                this.load.image(
                    'miguel_walk_3',
                    'assets/frames/miguel/03_walk_3.png'
                );
                this.load.image(
                    'miguel_jump',
                    'assets/frames/miguel/04_jump.png'
                );
                this.load.image(
                    'miguel_double_jump',
                    'assets/frames/miguel/05_double_jump.png'
                );
                this.load.image(
                    'miguel_punch',
                    'assets/frames/miguel/06_punch.png'
                );
                this.load.image(
                    'miguel_power_cast',
                    'assets/frames/miguel/07_power_cast.png'
                );
                this.load.image(
                    'miguel_dust_1',
                    'assets/frames/miguel/08_dust_1.png'
                );
                this.load.image(
                    'miguel_dust_2',
                    'assets/frames/miguel/09_dust_2.png'
                );
                this.load.image(
                    'miguel_dust_3',
                    'assets/frames/miguel/10_dust_3.png'
                );
                this.load.image(
                    'miguel_reserved',
                    'assets/frames/miguel/11_reserved.png'
                );
                this.load.image(
                    'miguel_hurt',
                    'assets/frames/miguel/12_hurt.png'
                );
                this.load.image(
                    'miguel_victory',
                    'assets/frames/miguel/13_victory_trophy.png'
                );

                // Robô histórico provisório.
                // Será substituído quando os frames do robô
                // forem reconstruídos e aprovados.
                this.load.spritesheet(
                    'robo',
                    'assets/legacy/'
                    + 'sprites-invalidos-2026-07-13/'
                    + 'robo_sprites_original.png',
                    {
                        frameWidth: 215,
                        frameHeight: 129,
                        spacing: 0
                    }
                );

// Gera a textura do cristal tecnológico via código puro
                const graficoCristal = this.make.graphics({ x: 0, y: 0, add: false });
                graficoCristal.fillStyle(0x00E5FF, 0.35);
                graficoCristal.fillCircle(18, 18, 18);
                graficoCristal.fillStyle(0x00FFFF, 1);
                graficoCristal.fillPoints([
                    { x: 18, y: 0 },
                    { x: 34, y: 18 },
                    { x: 18, y: 36 },
                    { x: 2, y: 18 }
                ], true);
                graficoCristal.lineStyle(3, 0xE6FFFF, 1);
                graficoCristal.strokePoints([
                    { x: 18, y: 0 },
                    { x: 34, y: 18 },
                    { x: 18, y: 36 },
                    { x: 2, y: 18 }
                ], true);
                graficoCristal.lineStyle(2, 0x7DF9FF, 0.85);
                graficoCristal.lineBetween(18, 0, 18, 36);
                graficoCristal.lineBetween(2, 18, 34, 18);
                graficoCristal.fillStyle(0xFFFFFF, 0.9);
                graficoCristal.fillCircle(13, 10, 3);
                graficoCristal.generateTexture('cristalTecnologico', 36, 36);
                graficoCristal.destroy();
            }

            create() {
                // Título em Alto Contraste (Amarelo Arcade sobre fundo quase preto)
                this.add.text(400, 140, 'AS AVENTURAS DO MIGUEL', {
                    fontSize: '36px',
                    fill: '#FFCC00',
                    fontStyle: 'bold',
                    fontFamily: 'Courier New'
                }).setOrigin(0.5);

                // Ativa e exibe a caixa de texto em HTML em cima do canvas
                const containerNome = document.getElementById('name-input-container');
                containerNome.style.display = 'flex';
                containerNome.style.visibility = 'visible';

                // Lógica ao clicar no botão "ENTRAR"
                const botaoEntrar = document.getElementById('start-button');
                botaoEntrar.onclick = () => {
                    let nome = document.getElementById('player-name-input').value.trim();
                    if (!nome) nome = "MIG";
                    nome = nome.substring(0, 3).toUpperCase();

                    this.registry.set('nomeJogador', nome);
                    this.registry.set('pontuacao', 0);

                    // Inicia a fase e garante que a camada HTML não bloqueie o canvas.
                    this.scene.start('Fase1');
                    containerNome.style.visibility = 'hidden';
                    containerNome.style.display = 'none';
                };
            }
        }

        // ==========================================
        // CENA 2: FASE 1
        // ==========================================
        class Fase1 extends Phaser.Scene {
            constructor() {
                super('Fase1');
            }

            create() {
                console.log('Fase1 iniciada');

                // Cenário dinâmico ao fundo: nuvens desenhadas por código
                this.nuvens = [];
                const dadosNuvens = [
                    { x: 130, y: 105, escala: 0.9, velocidade: 0.18 },
                    { x: 360, y: 75, escala: 0.7, velocidade: 0.12 },
                    { x: 590, y: 135, escala: 1.05, velocidade: 0.16 },
                    { x: 760, y: 95, escala: 0.8, velocidade: 0.2 }
                ];

                dadosNuvens.forEach((dados) => {
                    const nuvem = this.add.container(dados.x, dados.y).setDepth(-10);
                    const brilho = 0xFFFFFF;
                    nuvem.add(this.add.ellipse(-28, 8, 70, 28, brilho, 0.7));
                    nuvem.add(this.add.ellipse(12, 0, 82, 34, brilho, 0.82));
                    nuvem.add(this.add.ellipse(42, 10, 62, 24, brilho, 0.68));
                    nuvem.setScale(dados.escala);
                    nuvem.velocidade = dados.velocidade;
                    this.nuvens.push(nuvem);
                });

                // Placar de Alto Contraste
                this.nome = this.registry.get('nomeJogador');
                this.pontos = this.registry.get('pontuacao');
                this.textoPlacar = this.add.text(20, 20, `${this.nome} SCORE: ${this.pontos}`, {
                    fontSize: '28px',
                    fill: '#FFCC00',
                    fontStyle: 'bold'
                });

                // PLATAFORMAS (Alto contraste)
                this.plataformas = this.physics.add.staticGroup();

                // Chão Principal (Verde Neon gritante para contrastar com o uniforme vermelho/azul)
                let chao = this.add.rectangle(400, 460, 800, 40, 0x00FF66);
                this.physics.add.existing(chao, true);
                this.plataformas.add(chao);

                // Plataformas flutuantes (Branco Puro para total destaque no fundo escuro)
                let plat1 = this.add.rectangle(600, 300, 180, 24, 0xFFFFFF);
                this.physics.add.existing(plat1, true);
                this.plataformas.add(plat1);

                let plat2 = this.add.rectangle(200, 200, 180, 24, 0xFFFFFF);
                this.physics.add.existing(plat2, true);
                this.plataformas.add(plat2);

                // INIMIGO: robô vilão animado pelo spritesheet novo
                if (!this.textures.exists('particulaVilao')) {
                    const graficoParticula = this.make.graphics({ x: 0, y: 0, add: false });
                    graficoParticula.fillStyle(0xFF2222, 1);
                    graficoParticula.fillRect(0, 0, 8, 8);
                    graficoParticula.generateTexture('particulaVilao', 8, 8);
                    graficoParticula.destroy();
                }

                this.vilao = this.physics.add.sprite(600, 366, 'robo', 0);
                this.vilao.setScale(0.45);
                this.vilao.setCollideWorldBounds(false);
                this.vilao.setVelocityX(90);
                this.vilao.setBounce(0);
                this.vilao.body.setSize(78, 92);
                this.vilao.body.setOffset(25, 24);
                this.vilao.limiteEsquerda = plat1.x - (plat1.width / 2) + (this.vilao.displayWidth / 2);
                this.vilao.limiteDireita = plat1.x + (plat1.width / 2) - (this.vilao.displayWidth / 2);
                this.vilao.direcao = 1;
                this.ultimoDanoVilao = 0;

                // CAIXA INDICADORA DE TESTES (Fica atrás do sprite. Se o sprite sumir, você verá este bloco se mexendo!)
                this.indicadorPosicao = this.add.rectangle(50, 320, 60, 80, 0x333333);

                // CRIANDO O MIGUEL
                this.player = this.physics.add.sprite(50, 320, 'miguel_idle');
                this.player.setScale(0.95);
                this.player.body.setSize(54, 116);
                this.player.body.setOffset(101, 108);
                this.player.pulosDisponiveis = 2;
                this.player.estaAtacando = false;
                this.player.estaEmPoeira = false;
                this.player.giroDuploAtivo = false;
                this.player.estavaNoChao = false;
                this.player.setDepth(10);
                this.player.setCollideWorldBounds(true);

                this.physics.add.collider(this.player, this.plataformas);
                this.physics.add.collider(this.vilao, this.plataformas);
                this.physics.add.collider(this.player, this.vilao, this.acertarVilao, null, this);

                // Os frames de poeira contêm o Miguel completo.
                // Por isso o efeito substitui visualmente o jogador
                // durante alguns milissegundos, em vez de criar um
                // segundo Miguel abaixo da linha do chão.
                this.poeira = this.add.sprite(
                    0,
                    0,
                    'miguel_dust_1'
                );

                this.poeira
                    .setVisible(false)
                    .setDepth(11)
                    .setScale(0.95);

                // Visual separado para a cambalhota.
                // O corpo físico permanece no player original.
                this.doubleJumpVisual = this.add.image(
                    0,
                    0,
                    'miguel_double_jump'
                );

                // Centro aproximado do corpo recolhido:
                // bbox do frame: 81,126 até 174,200.
                this.doubleJumpVisual.setOrigin(
                    127.5 / 256,
                    163 / 256
                );

                // A pose é comprimida verticalmente para parecer
                // mais agachada e recolhida durante o giro.
                this.doubleJumpVisual.setScale(
                    1.02,
                    0.82
                );

                this.doubleJumpVisual
                    .setVisible(false)
                    .setDepth(12);

                this.tweenGiroDuplo = null;

                // CRISTAIS TECNOLÓGICOS COLETÁVEIS
                this.cristais = this.physics.add.group({
                    key: 'cristalTecnologico',
                    repeat: 4,
                    setXY: { x: 180, y: 25, stepX: 130 }
                });

                this.cristais.children.iterate(function (child) {
                    child.setBounceY(Phaser.Math.FloatBetween(0.4, 0.6));
                    child.setAngularVelocity(90);
                    child.setDepth(5);
                });

                this.physics.add.collider(this.cristais, this.plataformas);
                this.physics.add.overlap(this.player, this.cristais, this.coletarCristal, null, this);

                // ANIMAÇÕES DO MIGUEL
                // Agora utilizam texturas individuais.
                if (!this.anims.exists('walk')) {
                    this.anims.create({
                        key: 'walk',
                        frames: [
                            { key: 'miguel_walk_1' },
                            { key: 'miguel_walk_2' },
                            { key: 'miguel_walk_3' }
                        ],
                        frameRate: 8,
                        repeat: -1
                    });

                    this.anims.create({
                        key: 'idle',
                        frames: [
                            { key: 'miguel_idle' }
                        ],
                        frameRate: 1,
                        repeat: -1
                    });

                    this.anims.create({
                        key: 'jump',
                        frames: [
                            { key: 'miguel_jump' }
                        ],
                        frameRate: 1,
                        repeat: 0
                    });

                    this.anims.create({
                        key: 'jump_double',
                        frames: [
                            { key: 'miguel_double_jump' }
                        ],
                        frameRate: 1,
                        repeat: 0
                    });

                    this.anims.create({
                        key: 'attack',
                        frames: [
                            { key: 'miguel_punch' },
                            { key: 'miguel_punch' },
                            { key: 'miguel_idle' }
                        ],
                        frameRate: 10,
                        repeat: 0
                    });

                    this.anims.create({
                        key: 'power_cast',
                        frames: [
                            { key: 'miguel_power_cast' },
                            { key: 'miguel_power_cast' },
                            { key: 'miguel_idle' }
                        ],
                        frameRate: 10,
                        repeat: 0
                    });

                    this.anims.create({
                        key: 'dust_effect',
                        frames: [
                            { key: 'miguel_dust_1' },
                            { key: 'miguel_dust_2' },
                            { key: 'miguel_dust_3' }
                        ],
                        frameRate: 12,
                        repeat: 0
                    });

                    this.anims.create({
                        key: 'hurt',
                        frames: [
                            { key: 'miguel_hurt' }
                        ],
                        frameRate: 1,
                        repeat: 0
                    });

                    this.anims.create({
                        key: 'victory',
                        frames: [
                            { key: 'miguel_victory' }
                        ],
                        frameRate: 1,
                        repeat: -1
                    });

                    this.anims.create({
                        key: 'robo_patrol',
                        frames: this.anims.generateFrameNumbers(
                            'robo',
                            { start: 0, end: 2 }
                        ),
                        frameRate: 8,
                        repeat: -1
                    });

                    this.anims.create({
                        key: 'robo_damage',
                        frames: this.anims.generateFrameNumbers(
                            'robo',
                            { start: 3, end: 5 }
                        ),
                        frameRate: 12,
                        repeat: 0
                    });

                    this.anims.create({
                        key: 'robo_explosion',
                        frames: this.anims.generateFrameNumbers(
                            'robo',
                            { start: 6, end: 8 }
                        ),
                        frameRate: 16,
                        repeat: 0
                    });
                }

                this.vilao.anims.play(
                    'robo_patrol',
                    true
                );

                // CONTROLES DE TECLADO
                this.cursors = (
                    this.input.keyboard
                        .createCursorKeys()
                );

                this.teclas = (
                    this.input.keyboard.addKeys({
                        esquerda:
                            Phaser.Input.Keyboard
                                .KeyCodes.A,

                        direita:
                            Phaser.Input.Keyboard
                                .KeyCodes.D,

                        pulo:
                            Phaser.Input.Keyboard
                                .KeyCodes.W,

                        descer:
                            Phaser.Input.Keyboard
                                .KeyCodes.S,

                        reiniciar:
                            Phaser.Input.Keyboard
                                .KeyCodes.R,

                        ataque:
                            Phaser.Input.Keyboard
                                .KeyCodes.X
                    })
                );

                this.teclaAtaque = (
                    this.input.keyboard.addKey(
                        Phaser.Input.Keyboard
                            .KeyCodes.SPACE
                    )
                );

                this.input.keyboard.addCapture([
                    Phaser.Input.Keyboard.KeyCodes.UP,
                    Phaser.Input.Keyboard.KeyCodes.DOWN,
                    Phaser.Input.Keyboard.KeyCodes.LEFT,
                    Phaser.Input.Keyboard.KeyCodes.RIGHT,
                    Phaser.Input.Keyboard.KeyCodes.W,
                    Phaser.Input.Keyboard.KeyCodes.A,
                    Phaser.Input.Keyboard.KeyCodes.S,
                    Phaser.Input.Keyboard.KeyCodes.D,
                    Phaser.Input.Keyboard.KeyCodes.R,
                    Phaser.Input.Keyboard.KeyCodes.X,
                    Phaser.Input.Keyboard.KeyCodes.SPACE
                ]);

                // O Phaser possui um ponteiro principal.
                // Cinco adicionais permitem até seis toques.
                this.input.addPointer(5);

                this.toquesEsquerda = new Set();
                this.toquesDireita = new Set();

                this.filaPulos = 0;
                this.filaAtaques = 0;

                // CONTROLES VIRTUAIS
                this.btnEsq = this.add.rectangle(
                    90,
                    530,
                    140,
                    110,
                    0x222222,
                    0.85
                ).setInteractive();

                this.btnEsq.setStrokeStyle(
                    4,
                    0xFFCC00
                );

                this.add.text(
                    90,
                    530,
                    '◀',
                    {
                        fontSize: '56px',
                        fill: '#FFCC00'
                    }
                ).setOrigin(0.5);

                this.btnDir = this.add.rectangle(
                    270,
                    530,
                    140,
                    110,
                    0x222222,
                    0.85
                ).setInteractive();

                this.btnDir.setStrokeStyle(
                    4,
                    0xFFCC00
                );

                this.add.text(
                    270,
                    530,
                    '▶',
                    {
                        fontSize: '56px',
                        fill: '#FFCC00'
                    }
                ).setOrigin(0.5);

                this.btnPulo = this.add.rectangle(
                    625,
                    530,
                    130,
                    110,
                    0xFFCC00,
                    0.95
                ).setInteractive();

                this.add.text(
                    625,
                    530,
                    'PULO',
                    {
                        fontSize: '26px',
                        fill: '#0d1117',
                        fontStyle: 'bold'
                    }
                ).setOrigin(0.5);

                this.btnAtaque = this.add.rectangle(
                    745,
                    530,
                    90,
                    110,
                    0xFF3333,
                    0.95
                ).setInteractive();

                this.btnAtaque.setStrokeStyle(
                    4,
                    0xFFFFFF
                );

                this.add.text(
                    745,
                    530,
                    'BATER',
                    {
                        fontSize: '18px',
                        fill: '#FFFFFF',
                        fontStyle: 'bold'
                    }
                ).setOrigin(0.5);

                const vincularDirecional = (
                    botao,
                    conjunto
                ) => {
                    const pressionar = (pointer) => {
                        conjunto.add(pointer.id);
                    };

                    const liberar = (pointer) => {
                        conjunto.delete(pointer.id);
                    };

                    botao.on(
                        'pointerdown',
                        pressionar
                    );

                    botao.on(
                        'pointerup',
                        liberar
                    );

                    botao.on(
                        'pointerout',
                        liberar
                    );

                    botao.on(
                        'pointerupoutside',
                        liberar
                    );
                };

                vincularDirecional(
                    this.btnEsq,
                    this.toquesEsquerda
                );

                vincularDirecional(
                    this.btnDir,
                    this.toquesDireita
                );

                this.btnPulo.on(
                    'pointerdown',
                    () => {
                        this.filaPulos = Math.min(
                            this.filaPulos + 1,
                            2
                        );
                    }
                );

                this.btnAtaque.on(
                    'pointerdown',
                    () => {
                        this.filaAtaques = Math.min(
                            this.filaAtaques + 1,
                            2
                        );
                    }
                );

                this.input.on(
                    'pointerup',
                    (pointer) => {
                        this.toquesEsquerda.delete(
                            pointer.id
                        );

                        this.toquesDireita.delete(
                            pointer.id
                        );
                    }
                );

                this.input.on(
                    'gameout',
                    () => {
                        this.toquesEsquerda.clear();
                        this.toquesDireita.clear();
                    }
                );
            }

            sincronizarGiroDuplo() {
                if (
                    !this.player.giroDuploAtivo
                    || !this.doubleJumpVisual.visible
                ) {
                    return;
                }

                const escalaBase = 0.95;

                const deslocamentoX = (
                    (127.5 - 128)
                    * escalaBase
                );

                const deslocamentoY = (
                    (163 - 128)
                    * escalaBase
                );

                this.doubleJumpVisual.setPosition(
                    this.player.x + deslocamentoX,
                    this.player.y + deslocamentoY
                );

                this.doubleJumpVisual.setFlipX(
                    this.player.flipX
                );
            }

            cancelarGiroDuplo() {
                if (this.tweenGiroDuplo) {
                    this.tweenGiroDuplo.stop();
                    this.tweenGiroDuplo = null;
                }

                this.player.giroDuploAtivo = false;

                this.doubleJumpVisual
                    .setVisible(false)
                    .setAngle(0)
                    .setScale(1.02, 0.82);

                if (!this.player.estaEmPoeira) {
                    this.player.setVisible(true);
                }

                this.player.setAngle(0);
            }

            iniciarGiroDuplo() {
                this.cancelarGiroDuplo();

                this.player.giroDuploAtivo = true;
                this.player.setVisible(false);

                this.doubleJumpVisual
                    .setVisible(true)
                    .setAngle(0)
                    .setAlpha(1)
                    .setScale(1.02, 0.82)
                    .setFlipX(this.player.flipX);

                this.sincronizarGiroDuplo();

                const direcao = (
                    this.player.flipX
                    ? -1
                    : 1
                );

                this.tweenGiroDuplo = (
                    this.tweens.add({
                        targets:
                            this.doubleJumpVisual,

                        angle:
                            direcao * 360,

                        duration: 440,

                        ease:
                            'Cubic.easeInOut',

                        onUpdate: () => {
                            this.sincronizarGiroDuplo();
                        },

                        onComplete: () => {
                            this.player
                                .giroDuploAtivo = false;

                            this.tweenGiroDuplo = null;

                            this.doubleJumpVisual
                                .setVisible(false)
                                .setAngle(0)
                                .setScale(1.02, 0.82);

                            if (
                                !this.player
                                    .estaEmPoeira
                            ) {
                                this.player
                                    .setVisible(true);
                            }

                            this.player.setAngle(0);
                        }
                    })
                );
            }

            cancelarPoeira() {
                if (!this.player.estaEmPoeira) {
                    return;
                }

                this.poeira.anims.stop();

                this.poeira.off(
                    'animationcomplete-dust_effect'
                );

                this.poeira.setVisible(false);
                this.player.estaEmPoeira = false;

                if (
                    !this.player.giroDuploAtivo
                ) {
                    this.player.setVisible(true);
                }
            }

            update() {
                this.nuvens.forEach((nuvem) => {
                    nuvem.x -= nuvem.velocidade;

                    if (nuvem.x < -120) {
                        nuvem.x = 920;
                    }
                });

                this.indicadorPosicao.x = (
                    this.player.x
                );

                this.indicadorPosicao.y = (
                    this.player.y
                );

                const noChao = Boolean(
                    this.player.body.blocked.down
                    || this.player.body.touching.down
                );

                if (
                    Phaser.Input.Keyboard.JustDown(
                        this.teclas.reiniciar
                    )
                ) {
                    this.registry.set(
                        'pontuacao',
                        0
                    );

                    this.scene.restart();
                    return;
                }

                if (
                    noChao
                    && !this.player.estavaNoChao
                ) {
                    this.player.pulosDisponiveis = 2;

                    this.cancelarGiroDuplo();
                    this.tocarPoeira();
                } else if (noChao) {
                    this.player.pulosDisponiveis = 2;
                }

                if (
                    this.vilao
                    && this.vilao.active
                ) {
                    if (
                        this.vilao.x
                        <= this.vilao.limiteEsquerda
                    ) {
                        this.vilao.x = (
                            this.vilao
                                .limiteEsquerda
                        );

                        this.vilao.direcao = 1;
                        this.vilao.setVelocityX(90);
                    } else if (
                        this.vilao.x
                        >= this.vilao.limiteDireita
                    ) {
                        this.vilao.x = (
                            this.vilao
                                .limiteDireita
                        );

                        this.vilao.direcao = -1;
                        this.vilao.setVelocityX(-90);
                    }
                }

                const esquerda = Boolean(
                    this.cursors.left.isDown
                    || this.teclas.esquerda.isDown
                    || this.toquesEsquerda.size > 0
                );

                const direita = Boolean(
                    this.cursors.right.isDown
                    || this.teclas.direita.isDown
                    || this.toquesDireita.size > 0
                );

                if (esquerda && !direita) {
                    this.player.setVelocityX(-220);
                    this.player.setFlipX(true);

                    if (
                        noChao
                        && !this.player.estaAtacando
                        && !this.player.estaEmPoeira
                    ) {
                        this.player.anims.play(
                            'walk',
                            true
                        );
                    }
                } else if (
                    direita
                    && !esquerda
                ) {
                    this.player.setVelocityX(220);
                    this.player.setFlipX(false);

                    if (
                        noChao
                        && !this.player.estaAtacando
                        && !this.player.estaEmPoeira
                    ) {
                        this.player.anims.play(
                            'walk',
                            true
                        );
                    }
                } else {
                    this.player.setVelocityX(0);

                    if (
                        noChao
                        && !this.player.estaAtacando
                        && !this.player.estaEmPoeira
                    ) {
                        this.player.anims.play(
                            'idle',
                            true
                        );
                    }
                }

                const descer = Boolean(
                    this.cursors.down.isDown
                    || this.teclas.descer.isDown
                );

                if (
                    descer
                    && !noChao
                    && this.player.body.velocity.y
                        < 360
                ) {
                    this.player.setVelocityY(360);
                }

                const pediuPulo = Boolean(
                    Phaser.Input.Keyboard.JustDown(
                        this.cursors.up
                    )
                    || Phaser.Input.Keyboard.JustDown(
                        this.teclas.pulo
                    )
                    || this.filaPulos > 0
                );

                if (pediuPulo) {
                    if (this.filaPulos > 0) {
                        this.filaPulos -= 1;
                    }

                    this.executarPulo(noChao);
                }

                const pediuAtaque = Boolean(
                    Phaser.Input.Keyboard.JustDown(
                        this.teclaAtaque
                    )
                    || Phaser.Input.Keyboard.JustDown(
                        this.teclas.ataque
                    )
                    || this.filaAtaques > 0
                );

                if (pediuAtaque) {
                    if (this.filaAtaques > 0) {
                        this.filaAtaques -= 1;
                    }

                    this.executarAtaque();
                }

                if (
                    !noChao
                    && !this.player.estaAtacando
                    && !this.player.giroDuploAtivo
                    && !this.player.estaEmPoeira
                ) {
                    const animacaoPulo = (
                        this.player
                            .pulosDisponiveis === 0
                        ? 'jump_double'
                        : 'jump'
                    );

                    this.player.anims.play(
                        animacaoPulo,
                        true
                    );
                }

                if (
                    this.player.giroDuploAtivo
                ) {
                    this.sincronizarGiroDuplo();
                }

                if (this.player.estaEmPoeira) {
                    this.poeira.setPosition(
                        this.player.x,
                        this.player.y
                    );

                    this.poeira.setFlipX(
                        this.player.flipX
                    );
                }

                this.player.estavaNoChao = noChao;
            }

            executarPulo(noChao) {
                this.cancelarPoeira();

                if (noChao) {
                    this.player.pulosDisponiveis = 1;

                    this.player.setVelocityY(-520);

                    if (!this.player.estaAtacando) {
                        this.player.anims.play(
                            'jump',
                            true
                        );
                    }

                    return;
                }

                if (
                    this.player.pulosDisponiveis > 0
                ) {
                    this.player.pulosDisponiveis = 0;
                    this.player.setVelocityY(-500);

                    this.iniciarGiroDuplo();
                }
            }

            executarAtaque() {
                if (this.player.estaAtacando) return;

                this.cancelarGiroDuplo();
                this.cancelarPoeira();

                this.player.estaAtacando = true;
                this.player.anims.play('attack', true);
                this.player.once('animationcomplete-attack', () => {
                    this.player.estaAtacando = false;
                });

                const alcance = 70;
                const direcao = this.player.flipX ? -1 : 1;
                const areaAtaque = new Phaser.Geom.Rectangle(
                    this.player.x + (direcao > 0 ? 10 : -alcance - 10),
                    this.player.y - 45,
                    alcance,
                    90
                );

                if (this.vilao && this.vilao.active && Phaser.Geom.Rectangle.Overlaps(areaAtaque, this.vilao.getBounds())) {
                    this.destruirVilao(this.vilao);
                }
            }

            tocarPoeira() {
                if (this.player.estaAtacando) {
                    return;
                }

                this.cancelarPoeira();

                this.player.estaEmPoeira = true;

                // Mesma posição, escala e orientação do player.
                // Não utiliza body.bottom porque os frames de
                // poeira possuem canvas completo de 256x256.
                this.poeira.setPosition(
                    this.player.x,
                    this.player.y
                );

                this.poeira.setScale(
                    this.player.scaleX,
                    this.player.scaleY
                );

                this.poeira.setFlipX(
                    this.player.flipX
                );

                this.player.setVisible(false);
                this.poeira.setVisible(true);

                this.poeira.anims.play(
                    'dust_effect',
                    true
                );

                this.poeira.off(
                    'animationcomplete-dust_effect'
                );

                this.poeira.once(
                    'animationcomplete-dust_effect',
                    () => {
                        this.poeira.setVisible(false);
                        this.player.estaEmPoeira = false;

                        if (
                            !this.player
                                .giroDuploAtivo
                        ) {
                            this.player
                                .setVisible(true);
                        }
                    }
                );
            }

            destruirVilao(vilao) {
                vilao.setVelocity(0, 0);
                vilao.body.enable = false;
                vilao.anims.play('robo_explosion', true);
                vilao.once('animationcomplete-robo_explosion', () => vilao.disableBody(true, true));
            }

            coletarCristal(player, cristal) {
                cristal.disableBody(true, true);
                this.pontos += 10;
                this.registry.set('pontuacao', this.pontos);
                this.textoPlacar.setText(`${this.nome} SCORE: ${this.pontos}`);

                if (this.cristais.countActive(true) === 0) {
                    this.scene.start('Fase2');
                }
            }
            acertarVilao(player, vilao) {
                const pisouNoVilao = player.body.velocity.y > 0 && player.body.bottom <= vilao.body.top + 18;

                if (pisouNoVilao) {
                    const explosao = this.add.particles(vilao.x, vilao.y, 'particulaVilao', {
                        speed: { min: 80, max: 260 },
                        angle: { min: 0, max: 360 },
                        lifespan: 500,
                        gravityY: 500,
                        scale: { start: 1.4, end: 0 },
                        quantity: 18,
                        emitting: false
                    });

                    explosao.explode(18);
                    this.time.delayedCall(600, () => explosao.destroy());
                    this.destruirVilao(vilao);
                    player.setVelocityY(-300);
                    return;
                }

                if (this.time.now - this.ultimoDanoVilao < 900) return;

                this.ultimoDanoVilao = this.time.now;
                this.pontos -= 5;
                this.registry.set('pontuacao', this.pontos);
                this.textoPlacar.setText(`${this.nome} SCORE: ${this.pontos}`);
                vilao.anims.play('robo_damage', true);
                vilao.once('animationcomplete-robo_damage', () => {
                    if (vilao.active) vilao.anims.play('robo_patrol', true);
                });
                player.setVelocityX(player.x < vilao.x ? -260 : 260);
            }
        }

        // ==========================================
        // CENA 3: TELA DE VITÓRIA
        // ==========================================
        class Fase2 extends Phaser.Scene {
            constructor() {
                super('Fase2');
            }

            create() {
                let nome = this.registry.get('nomeJogador');
                let pontosFinal = this.registry.get('pontuacao');

                this.add.image(
                    175,
                    275,
                    'miguel_victory'
                )
                    .setScale(1.05)
                    .setDepth(5);

                this.add.text(
                    505,
                    175,
                    'FASE 1 CONCLUÍDA!',
                    {
                        fontSize: '38px',
                        fill: '#00FF66',
                        fontStyle: 'bold'
                    }
                ).setOrigin(0.5);

                this.add.text(
                    505,
                    275,
                    `HERÓI: ${nome}`,
                    {
                        fontSize: '26px',
                        fill: '#FFF'
                    }
                ).setOrigin(0.5);

                this.add.text(
                    505,
                    335,
                    `PONTOS: ${pontosFinal}`,
                    {
                        fontSize: '32px',
                        fill: '#FFCC00',
                        fontStyle: 'bold'
                    }
                ).setOrigin(0.5);

                let btnVoltar = this.add.text(
                    505,
                    455,
                    '[ JOGAR NOVAMENTE ]',
                    {
                        fontSize: '24px',
                        fill: '#FFCC00',
                        fontStyle: 'bold'
                    }
                ).setOrigin(0.5);
                btnVoltar.setInteractive();
                btnVoltar.on('pointerdown', () => {
                    this.scene.start('MenuPrincipal');
                });
            }
        }

        // ==========================================
        // CONFIGURAÇÕES GERAIS (ESCAlA MOBILE-FIRST)
        // ==========================================
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            width: 800,
            height: 600,
            backgroundColor: '#0d1117', // Fundo escuro de altíssimo contraste
            scale: {
                mode: Phaser.Scale.FIT, // Faz o jogo expandir e caber perfeitamente em telas de qualquer celular
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 750 }, debug: false }
            },
            scene: [MenuPrincipal, Fase1, Fase2]
        };

        const game = new Phaser.Game(config);
    </script>
</body>
