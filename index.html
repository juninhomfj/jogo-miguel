<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Jogo do Miguel</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; }
        canvas { border: 4px solid #fff; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <script>
        // ==========================================
        // CENA 1: MENU INICIAL E NOME DO JOGADOR
        // ==========================================
        class MenuPrincipal extends Phaser.Scene {
            constructor() {
                super('MenuPrincipal');
            }

            preload() {
                // Carrega o personagem com as medidas corretas
                this.load.spritesheet('miguel', 'miguel_sprites.png', { frameWidth: 216, frameHeight: 288 });
                
                // Cria uma "moeda" desenhada pelo código para não precisarmos de outra imagem agora
                let graficoMoeda = this.make.graphics().fillStyle(0xFFD700).fillCircle(15, 15, 15);
                graficoMoeda.generateTexture('moeda', 30, 30);
                graficoMoeda.destroy();
            }

            create() {
                this.cameras.main.setBackgroundColor('#1E90FF'); // Fundo azul escuro

                this.add.text(400, 150, 'AS AVENTURAS DO MIGUEL', { fontSize: '40px', fill: '#FFF', fontStyle: 'bold' }).setOrigin(0.5);
                
                let textoAviso = this.add.text(400, 300, 'CLIQUE NA TELA PARA INICIAR', { fontSize: '24px', fill: '#FFD700' }).setOrigin(0.5);

                // Efeito piscando no texto
                this.tweens.add({ targets: textoAviso, alpha: 0, duration: 800, ease: 'Linear', yoyo: true, repeat: -1 });

                // Quando o jogador clica na tela, pede o nome
                this.input.on('pointerdown', () => {
                    let nome = window.prompt("Digite suas iniciais (Máx 3 letras):", "MIG");
                    
                    if (nome) {
                        // Formata o nome para ficar com 3 letras maiúsculas (Estilo Fliperama)
                        nome = nome.substring(0, 3).toUpperCase();
                        
                        // Salva o nome e zera a pontuação na "memória" do jogo
                        this.registry.set('nomeJogador', nome);
                        this.registry.set('pontuacao', 0);
                        
                        // Inicia a Fase 1
                        this.scene.start('Fase1');
                    }
                });
            }
        }

        // ==========================================
        // CENA 2: FASE 1 - A MISSÃO
        // ==========================================
        class Fase1 extends Phaser.Scene {
            constructor() {
                super('Fase1');
            }

            create() {
                this.cameras.main.setBackgroundColor('#87CEEB'); // Fundo azul céu

                // Recupera os dados do jogador
                this.nome = this.registry.get('nomeJogador');
                this.pontos = this.registry.get('pontuacao');

                // Placar na tela
                this.textoPlacar = this.add.text(20, 20, `${this.nome} SCORE: ${this.pontos}`, { fontSize: '28px', fill: '#000', fontStyle: 'bold' });

                // PLATAFORMAS (Chão e blocos para pular)
                this.plataformas = this.physics.add.staticGroup();
                
                // Chão principal
                let chao = this.add.rectangle(400, 580, 800, 40, 0x228B22);
                this.physics.add.existing(chao, true); // true = estático (não cai)
                this.plataformas.add(chao);

                // Plataformas flutuantes
                let plat1 = this.add.rectangle(600, 450, 150, 20, 0x8B4513); // Marrom
                this.physics.add.existing(plat1, true);
                this.plataformas.add(plat1);

                let plat2 = this.add.rectangle(150, 350, 150, 20, 0x8B4513);
                this.physics.add.existing(plat2, true);
                this.plataformas.add(plat2);

                // CRIANDO O MIGUEL
                this.player = this.physics.add.sprite(50, 450, 'miguel');
                this.player.setScale(0.35); // Tamanho ajustado
                this.player.updateBounds();
                this.player.setCollideWorldBounds(true);

                // Faz o Miguel não atravessar as plataformas
                this.physics.add.collider(this.player, this.plataformas);

                // MOEDAS (Cria 5 moedas espalhadas)
                this.moedas = this.physics.add.group({
                    key: 'moeda',
                    repeat: 4,
                    setXY: { x: 150, y: 0, stepX: 130 }
                });

                // Faz as moedas quicarem um pouco ao cair
                this.moedas.children.iterate(function (child) {
                    child.setBounceY(Phaser.Math.FloatBetween(0.4, 0.8));
                });

                // Faz as moedas não atravessarem o chão
                this.physics.add.collider(this.moedas, this.plataformas);

                // Verifica se o Miguel encostou na moeda (chama a função coletarMoeda)
                this.physics.add.overlap(this.player, this.moedas, this.coletarMoeda, null, this);

                // ANIMAÇÕES
                if (!this.anims.exists('walk')) { // Verifica se já existem para não dar erro
                    this.anims.create({ key: 'walk', frames: this.anims.generateFrameNumbers('miguel', { start: 1, end: 2 }), frameRate: 10, repeat: -1 });
                    this.anims.create({ key: 'idle', frames: [ { key: 'miguel', frame: 0 } ], frameRate: 20 });
                    this.anims.create({ key: 'jump', frames: [ { key: 'miguel', frame: 3 } ], frameRate: 20 });
                }

                this.cursors = this.input.keyboard.createCursorKeys();
            }

            update() {
                let noChao = this.player.body.touching.down;

                if (this.cursors.left.isDown) {
                    this.player.setVelocityX(-200);
                    this.player.flipX = true;
                    if (noChao) this.player.anims.play('walk', true);
                }
                else if (this.cursors.right.isDown) {
                    this.player.setVelocityX(200);
                    this.player.flipX = false;
                    if (noChao) this.player.anims.play('walk', true);
                }
                else {
                    this.player.setVelocityX(0);
                    if (noChao) this.player.anims.play('idle', true);
                }

                if (this.cursors.up.isDown && noChao) {
                    this.player.setVelocityY(-450);
                }

                if (!noChao) {
                    this.player.anims.play('jump', true);
                }
            }

            // FUNÇÃO: O que acontece quando pega a moeda
            coletarMoeda(player, moeda) {
                moeda.disableBody(true, true); // Some com a moeda
                
                // Aumenta pontos e atualiza o texto na tela
                this.pontos += 10;
                this.registry.set('pontuacao', this.pontos);
                this.textoPlacar.setText(`${this.nome} SCORE: ${this.pontos}`);

                // Se não houver mais moedas ativas, PASSOU DE FASE!
                if (this.moedas.countActive(true) === 0) {
                    this.scene.start('Fase2');
                }
            }
        }

        // ==========================================
        // CENA 3: FASE 2 / TELA DE VITÓRIA
        // ==========================================
        class Fase2 extends Phaser.Scene {
            constructor() {
                super('Fase2');
            }

            create() {
                this.cameras.main.setBackgroundColor('#32CD32'); // Fundo verde

                let nome = this.registry.get('nomeJogador');
                let pontosFinal = this.registry.get('pontuacao');

                this.add.text(400, 200, 'FASE 1 CONCLUÍDA!', { fontSize: '40px', fill: '#FFF', fontStyle: 'bold' }).setOrigin(0.5);
                this.add.text(400, 300, `HERÓI: ${nome}`, { fontSize: '30px', fill: '#FFF' }).setOrigin(0.5);
                this.add.text(400, 350, `PONTUAÇÃO TOTAL: ${pontosFinal}`, { fontSize: '30px', fill: '#FFD700' }).setOrigin(0.5);

                let btnVoltar = this.add.text(400, 450, '[ JOGAR NOVAMENTE ]', { fontSize: '24px', fill: '#000' }).setOrigin(0.5);
                btnVoltar.setInteractive();
                btnVoltar.on('pointerdown', () => {
                    this.scene.start('MenuPrincipal');
                });
            }
        }

        // ==========================================
        // CONFIGURAÇÕES GERAIS DO JOGO
        // ==========================================
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            physics: {
                default: 'arcade',
                arcade: { gravity: { y: 600 }, debug: false }
            },
            // Avisa o jogo que existem essas 3 Cenas e carrega a primeira da lista
            scene: [MenuPrincipal, Fase1, Fase2] 
        };

        const game = new Phaser.Game(config);
    </script>
</body>
</html>
