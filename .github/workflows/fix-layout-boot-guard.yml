name: Corrigir boot do layout

on:
  push:
    branches:
      - sprint/fase-1-completa-audio
    paths:
      - '.github/workflows/fix-layout-boot-guard.yml'

permissions:
  contents: write

jobs:
  corrigir:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Baixar branch
        uses: actions/checkout@v4
        with:
          ref: sprint/fase-1-completa-audio

      - name: Proteger refresh antes do boot
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          arquivo = Path('index.html')
          texto = arquivo.read_text(encoding='utf-8')

          antigo = """            if (
                              game
                              && game.scale
                          ) {
                              game.scale.refresh();
                          }
          """

          novo = """            if (
                              game
                              && game.isBooted
                              && game.canvas
                              && game.canvas.style
                              && game.scale
                          ) {
                              game.scale.refresh();
                          }
          """

          if antigo not in texto:
              raise SystemExit('Bloco de refresh esperado não foi localizado.')

          arquivo.write_text(
              texto.replace(antigo, novo, 1),
              encoding='utf-8'
          )
          PY

      - name: Publicar correção
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'fix: evita refresh do Phaser antes do boot'
          git push origin HEAD:sprint/fase-1-completa-audio
