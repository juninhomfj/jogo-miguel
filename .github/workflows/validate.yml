name: Validar projeto

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'sprint/**'
      - 'hotfix/**'

permissions:
  contents: read

jobs:
  validar:
    runs-on: ubuntu-latest
    timeout-minutes: 29

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validar estrutura e sintaxe
        shell: bash
        run: |
          set -o pipefail
          node scripts/validate-project.mjs 2>&1 | tee validation-output.txt

      - name: Instalar navegador de teste
        run: npm install --no-save puppeteer-core@24.31.0

      - name: Executar smoke test da fase 1
        shell: bash
        run: |
          set -o pipefail
          node scripts/smoke-browser.mjs 2>&1 | tee smoke-output.txt

      - name: Executar smoke test do polimento da fase 1
        shell: bash
        run: |
          set -o pipefail
          node scripts/smoke-phase1-polish.mjs 2>&1 | tee smoke-phase1-polish-output.txt

      - name: Executar smoke test do feedback de combate da fase 1
        shell: bash
        run: |
          set -o pipefail
          node scripts/smoke-phase1-combat-feedback.mjs 2>&1 | tee smoke-phase1-combat-feedback-output.txt

      - name: Executar smoke test do agachamento da fase 1
        shell: bash
        run: |
          set -o pipefail
          node scripts/smoke-phase1-crouch.mjs 2>&1 | tee smoke-phase1-crouch-output.txt

      - name: Executar smoke test de exploração, baús e hoverboard
        shell: bash
        run: |
          set -o pipefail
          node scripts/smoke-phase1-exploration-loot.mjs 2>&1 | tee smoke-phase1-exploration-loot-output.txt

      - name: Executar smoke test de controles, interações e mini mísseis
        shell: bash
        run: |
          set -o pipefail
          node scripts/smoke-phase1-usability-overhaul.mjs 2>&1 | tee smoke-phase1-usability-overhaul-output.txt

      - name: Executar smoke test do disparo no tutorial
        shell: bash
        run: |
          set -o pipefail
          node scripts/smoke-tutorial-robot.mjs 2>&1 | tee smoke-tutorial-robot-output.txt

      - name: Executar smoke test de áudio do tutorial
        shell: bash
        run: |
          set -o pipefail
          node scripts/smoke-tutorial-audio.mjs 2>&1 | tee smoke-tutorial-audio-output.txt

      - name: Executar smoke test da conclusão do tutorial
        shell: bash
        run: |
          set -o pipefail
          node scripts/smoke-tutorial-completion.mjs 2>&1 | tee smoke-tutorial-completion-output.txt

      - name: Executar smoke test do tutorial até a fase 1
        shell: bash
        run: |
          set -o pipefail
          node scripts/smoke-tutorial-to-phase1.mjs 2>&1 | tee smoke-tutorial-to-phase1-output.txt

      - name: Publicar relatórios
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-output
          path: |
            validation-output.txt
            smoke-output.txt
            smoke-phase1-polish-output.txt
            smoke-phase1-combat-feedback-output.txt
            smoke-phase1-crouch-output.txt
            smoke-phase1-exploration-loot-output.txt
            smoke-phase1-usability-overhaul-output.txt
            smoke-tutorial-robot-output.txt
            smoke-tutorial-audio-output.txt
            smoke-tutorial-completion-output.txt
            smoke-tutorial-to-phase1-output.txt
          if-no-files-found: error
          retention-days: 3