name: Validar projeto

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'sprint/**'

permissions:
  contents: read

jobs:
  validar:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Validar estrutura e sintaxe
        shell: bash
        run: |
          set -o pipefail
          node scripts/validate-project.mjs 2>&1 | tee validation-output.txt

      - name: Publicar relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-output
          path: validation-output.txt
          if-no-files-found: error
          retention-days: 3
